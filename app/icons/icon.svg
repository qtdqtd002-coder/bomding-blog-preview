<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="블로그 컴퍼니">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4C6FFF"/>
      <stop offset="1" stop-color="#7C5CD1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- 쌓인 카드(글) 글리프 — 안전영역(80%) 안에 배치되어 maskable 호환 -->
  <g transform="translate(0,6)">
    <rect x="150" y="120" width="212" height="150" rx="34" fill="#fff" fill-opacity=".30"/>
    <rect x="128" y="154" width="256" height="172" rx="38" fill="#fff" fill-opacity=".55"/>
    <rect x="104" y="190" width="304" height="196" rx="42" fill="#fff"/>
    <rect x="150" y="246" width="160" height="26" rx="13" fill="#4C6FFF"/>
    <rect x="150" y="300" width="212" height="20" rx="10" fill="#7C5CD1" fill-opacity=".55"/>
    <rect x="150" y="340" width="120" height="20" rx="10" fill="#7C5CD1" fill-opacity=".35"/>
  </g>
</svg>
