<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="refresh" content="0; url=../">
<title>쓰담 — 메인으로 이동</title>
<link rel="canonical" href="../">
<style>
  body{font-family:system-ui,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:#fff;color:#555;text-align:center;padding:48px 24px;line-height:1.7;}
  a{color:#5A4FE6;font-weight:700;text-decoration:none;}
  @media(prefers-color-scheme:dark){ body{background:#0D0F12;color:#A8B0BD;} a{color:#9D93FF;} }
</style>
</head>
<body>
  <p>쓰담 앱이 메인으로 통합됐어요.<br>잠시 후 자동으로 이동합니다…</p>
  <p><a href="../">지금 이동하기</a></p>
  <script>
    try{
      if('serviceWorker' in navigator){
        navigator.serviceWorker.getRegistrations().then(function(rs){
          rs.forEach(function(r){ if((r.scope||'').indexOf('/app')>-1){ r.unregister(); } });
        });
      }
    }catch(e){}
    location.replace('../');
  </script>
</body>
</html>
