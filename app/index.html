<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>블로그 컴퍼니</title>
<meta name="description" content="블로그 컴퍼니 — 발행글·트렌드·뉴스레터·캘린더 + 새 글 요청 (설치형 웹앱)">
<meta name="theme-color" content="#4C6FFF" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0C0E12" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="블로그 컴퍼니">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ===== 스플래시(앱 셸 시작 화면) ===== -->
  <div class="splash" id="splash" aria-hidden="true">
    <div class="splash-mark">
      <img src="icons/icon.svg" alt="" width="84" height="84">
    </div>
    <div class="splash-name">블로그 컴퍼니</div>
    <div class="splash-bar"><span></span></div>
  </div>

  <!-- ===== 앱바 ===== -->
  <header class="appbar" id="appbar">
    <button class="ab-back" id="backBtn" hidden aria-label="뒤로">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <img class="ab-logo" id="abLogo" src="icons/icon.svg" alt="" width="30" height="30">
    <div class="ab-tt">
      <h1 id="abTitle">블로그 컴퍼니</h1>
      <span class="ab-sub" id="abSub">발행글 · 트렌드 · 뉴스레터 · 캘린더</span>
    </div>
    <button class="ab-act" id="siteBtn" aria-label="블로그 컴퍼니 사이트 열기" title="사이트로 이동">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3h7v7"/><path d="M21 3l-9 9"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>
      <span>사이트</span>
    </button>
    <button class="ab-install" id="installBtn" hidden aria-label="앱 설치">설치</button>
  </header>

  <!-- ===== 뷰(라우트별 JS 렌더) ===== -->
  <main class="view" id="view" tabindex="-1"></main>

  <!-- ===== 새 글 요청 FAB ===== -->
  <button class="fab" id="fab" aria-label="새 글 요청">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
  </button>

  <!-- ===== 하단 내비(JS가 레지스트리로 구성) ===== -->
  <nav class="tabbar" id="tabbar" aria-label="주요 메뉴"></nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
