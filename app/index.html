<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>블로그 컴퍼니</title>
<meta name="description" content="블로그 컴퍼니 — 글 보기 + 새 글 요청 (설치형 웹앱)">
<meta name="theme-color" content="#4F46E5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="블로그 컴퍼니">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<!-- 무료 오픈소스 디자인 토큰: Open Props (MIT, open-props.style). 리포에 동봉해 오프라인에서도 동작 -->
<link rel="stylesheet" href="vendor/open-props.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="head">
    <img class="logo" src="icons/icon-192.png" alt="">
    <div class="head-tt">
      <h1>블로그 컴퍼니</h1>
      <span class="head-sub">글 보기 · 새 글 요청</span>
    </div>
    <a class="ghbtn" id="ghBtn" href="https://github.com/qtdqtd002-coder/bomding-blog-preview" target="_blank" rel="noopener" aria-label="GitHub 저장소 열기">
      <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      <span>GitHub</span>
    </a>
    <button class="install" id="installBtn" hidden>📲 설치</button>
  </header>

  <main class="main">
    <!-- ===================== 글 목록 ===================== -->
    <section id="view-list">
      <div class="panel">
        <div class="panel-h">
          <span class="panel-ic" aria-hidden="true">📰</span>
          <div class="panel-tt"><b>발행된 글</b><span id="listCount" class="panel-meta">불러오는 중…</span></div>
        </div>
        <div class="panel-b">
          <div class="filters" id="filters"></div>
          <div id="postList"><div class="empty">글 목록 불러오는 중…</div></div>
        </div>
      </div>
      <p class="pushstate" id="pushState"></p>
      <p class="foot">블로그 컴퍼니 · 글은 발행 사이트 데이터(posts.json)를 읽어 보여줍니다.</p>
    </section>

    <!-- ===================== 새 글 요청 ===================== -->
    <section id="view-req" hidden>
      <!-- 동작 안내 배너: 5분마다 큐 확인 -->
      <div class="livebar">
        <span class="live-dot" aria-hidden="true"></span>
        <div class="live-tx">
          <b>요청은 <u>5분에 한 번</u> 자동으로 확인돼요.</b>
          <span>접수된 요청을 차례로 <em>작성 → 검수 → 발행</em>까지 자동 처리합니다. 발행이 끝나면 알림(푸시)으로 알려드려요.</span>
        </div>
        <span class="badge" id="backendBadge">확인 중…</span>
      </div>

      <!-- 요청 폼 패널 -->
      <div class="panel accent">
        <div class="panel-h">
          <span class="panel-ic" aria-hidden="true">✍️</span>
          <div class="panel-tt"><b>새 글 요청하기</b><span class="panel-meta">주제만 적어도 OK</span></div>
        </div>
        <div class="panel-b">
          <form class="form" id="reqForm">
            <div class="field">
              <label for="fTopic">주제 <span class="req-star">*</span></label>
              <input id="fTopic" type="text" placeholder="예: 메이크 드라마 MAD 초반 리롤 정리" autocomplete="off">
            </div>
            <div class="field">
              <label for="fMaterial">소재 / 참고 <span class="opt">선택</span></label>
              <textarea id="fMaterial" placeholder="포함했으면 하는 내용·소재·참고 링크 등"></textarea>
            </div>
            <div class="field">
              <label for="fWriter">희망 작성자 <span class="req-star">*</span></label>
              <select id="fWriter"></select>
            </div>
            <button class="submit" type="submit">발행 요청 보내기</button>
          </form>
        </div>
      </div>

      <!-- 내가 보낸 요청 패널 -->
      <div class="panel">
        <div class="panel-h">
          <span class="panel-ic" aria-hidden="true">📨</span>
          <div class="panel-tt"><b>내가 보낸 요청</b><span id="reqCount" class="panel-meta"></span></div>
        </div>
        <div class="panel-b">
          <div id="reqList"><div class="empty">아직 보낸 요청이 없어요.</div></div>
        </div>
      </div>
    </section>
  </main>

  <nav class="tabbar">
    <button data-tab="list" class="on"><span class="ic">📰</span>글 목록</button>
    <button data-tab="req"><span class="ic">✍️</span>새 글 요청</button>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
