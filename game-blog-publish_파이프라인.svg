<svg xmlns="http://www.w3.org/2000/svg" width="940" height="900" viewBox="0 0 940 900" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#444"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#e8590c"/>
    </marker>
    <marker id="arrowS" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#1c7ed6"/>
    </marker>
    <marker id="dotS" markerWidth="8" markerHeight="8" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,3 L8,6 z" fill="#1c7ed6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="900" fill="#f8f9fa"/>
  <text x="24" y="30" font-size="20" font-weight="800" fill="#212529">game-blog-publish — 오케스트레이터 파이프라인</text>
  <text x="24" y="50" font-size="12.5" fill="#868e96">작성(메인 세션) ↔ QA(서브에이전트) 피드백 루프 → PASS 시 가족방 카톡 자동 전송</text>

  <!-- USER -->
  <rect x="380" y="64" width="180" height="50" rx="10" fill="#fff" stroke="#adb5bd" stroke-width="2"/>
  <text x="470" y="84" font-size="14" font-weight="700" text-anchor="middle" fill="#343a40">사용자</text>
  <text x="470" y="102" font-size="12" text-anchor="middle" fill="#868e96">발주 (양식 6칸)</text>
  <line x1="470" y1="114" x2="470" y2="138" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ORCHESTRATOR -->
  <rect x="230" y="140" width="480" height="52" rx="12" fill="#f3effe" stroke="#7048e8" stroke-width="2.5"/>
  <text x="470" y="164" font-size="15" font-weight="800" text-anchor="middle" fill="#5f3dc4">game-blog-publish  ▸  오케스트레이터</text>
  <text x="470" y="183" font-size="11.5" text-anchor="middle" fill="#7048e8">작성 → QA → 수정 루프 → 전송을 지휘</text>
  <line x1="470" y1="192" x2="470" y2="232" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- WRITER -->
  <rect x="310" y="234" width="320" height="80" rx="12" fill="#e7f5ff" stroke="#1c7ed6" stroke-width="2.5"/>
  <text x="470" y="260" font-size="14.5" font-weight="800" text-anchor="middle" fill="#1864ab">① 작성 · 메인 세션</text>
  <text x="470" y="281" font-size="12.5" text-anchor="middle" fill="#1971c2">bomding-blog-writer (카테고리 게이트)</text>
  <text x="470" y="300" font-size="12" text-anchor="middle" fill="#495057">→ HTML 초안 저장</text>
  <line x1="470" y1="314" x2="470" y2="372" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="486" y="346" font-size="11.5" fill="#868e96">HTML 전달</text>

  <!-- QA -->
  <rect x="310" y="374" width="320" height="80" rx="12" fill="#ebfbee" stroke="#2f9e44" stroke-width="2.5"/>
  <text x="470" y="400" font-size="14.5" font-weight="800" text-anchor="middle" fill="#2b8a3e">② QA · 서브에이전트</text>
  <text x="470" y="421" font-size="12.5" text-anchor="middle" fill="#37b24d">game-blog-qa (공식 출처 교차검증)</text>
  <text x="470" y="440" font-size="12" text-anchor="middle" fill="#495057">→ 심각도 리포트 · PASS / FAIL</text>

  <!-- SOURCES (left of QA) -->
  <rect x="60" y="382" width="190" height="64" rx="10" fill="#fff" stroke="#adb5bd" stroke-width="1.8" stroke-dasharray="5 4"/>
  <text x="155" y="408" font-size="12.5" font-weight="700" text-anchor="middle" fill="#495057">공식 · 위키 · 공략</text>
  <text x="155" y="427" font-size="11.5" text-anchor="middle" fill="#868e96">교차검증 (근거 URL)</text>
  <line x1="250" y1="414" x2="310" y2="414" stroke="#868e96" stroke-width="1.8" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- GLOSSARY (right of QA) -->
  <rect x="690" y="382" width="190" height="64" rx="10" fill="#fff" stroke="#adb5bd" stroke-width="1.8" stroke-dasharray="5 4"/>
  <text x="785" y="408" font-size="12.5" font-weight="700" text-anchor="middle" fill="#495057">용어집 파일</text>
  <text x="785" y="427" font-size="11" text-anchor="middle" fill="#868e96">_glossary\&lt;게임&gt;.md</text>
  <line x1="630" y1="414" x2="690" y2="414" stroke="#868e96" stroke-width="1.8" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="660" y="404" font-size="10.5" text-anchor="middle" fill="#868e96">읽기/갱신</text>

  <line x1="470" y1="454" x2="470" y2="470" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DECISION -->
  <polygon points="470,466 580,520 470,574 360,520" fill="#fff4e6" stroke="#e8590c" stroke-width="2.5"/>
  <text x="470" y="514" font-size="14" font-weight="800" text-anchor="middle" fill="#d9480f">PASS?</text>
  <text x="470" y="534" font-size="12.5" text-anchor="middle" fill="#e8590c">🔴 0 · 🟡 0</text>

  <!-- DECISION -> TIMEOUT (right) -->
  <line x1="580" y1="520" x2="690" y2="520" stroke="#e8590c" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="635" y="510" font-size="11" text-anchor="middle" fill="#e8590c">3R 초과</text>
  <rect x="690" y="486" width="200" height="68" rx="10" fill="#fff5f5" stroke="#e03131" stroke-width="2"/>
  <text x="790" y="510" font-size="12.5" font-weight="700" text-anchor="middle" fill="#c92a2a">3라운드 초과 / 카톡 ERR</text>
  <text x="790" y="529" font-size="11.5" text-anchor="middle" fill="#e03131">→ 사용자 보고</text>
  <text x="790" y="546" font-size="11.5" text-anchor="middle" fill="#e03131">(전송 안 함)</text>

  <!-- FAIL LOOP back to writer -->
  <polyline points="360,520 55,520 55,274 310,274" fill="none" stroke="#e8590c" stroke-width="2.2" stroke-dasharray="7 5" marker-end="url(#arrowR)"/>
  <text x="120" y="214" font-size="12" font-weight="700" fill="#e8590c">FAIL · 이슈를 작성 세션으로</text>
  <text x="120" y="232" font-size="12" font-weight="700" fill="#e8590c">되돌려 수정 (최대 3라운드)</text>

  <!-- DECISION -> SEND (PASS) -->
  <line x1="470" y1="574" x2="470" y2="612" stroke="#2f9e44" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="486" y="598" font-size="12" font-weight="800" fill="#2b8a3e">PASS</text>

  <!-- SEND -->
  <rect x="235" y="614" width="470" height="86" rx="12" fill="#fff0f6" stroke="#e64980" stroke-width="2.5"/>
  <text x="470" y="640" font-size="14.5" font-weight="800" text-anchor="middle" fill="#c2255c">③ 전송 · PASS 시 자동 (전송 전 로그)</text>
  <text x="470" y="662" font-size="12.5" text-anchor="middle" fill="#e64980">kakao-send 스킬 (kakao_sender.py)</text>
  <text x="470" y="681" font-size="12.5" text-anchor="middle" fill="#e64980">--match 가족  ·  텍스트 요약 + HTML 첨부</text>
  <line x1="470" y1="700" x2="470" y2="740" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- BOMDING -->
  <rect x="350" y="742" width="240" height="58" rx="14" fill="#fff" stroke="#f59f00" stroke-width="2.5"/>
  <text x="470" y="767" font-size="14" font-weight="800" text-anchor="middle" fill="#e67700">가족방 (기본 대상)</text>
  <text x="470" y="786" font-size="12.5" text-anchor="middle" fill="#f08c00">가족♥ ˶•⩊•˶</text>

  <!-- LEGEND -->
  <text x="24" y="840" font-size="11.5" font-weight="700" fill="#868e96">색상</text>
  <rect x="64" y="831" width="13" height="13" rx="3" fill="#e7f5ff" stroke="#1c7ed6"/><text x="83" y="842" font-size="11.5" fill="#495057">메인 세션(작성)</text>
  <rect x="200" y="831" width="13" height="13" rx="3" fill="#ebfbee" stroke="#2f9e44"/><text x="219" y="842" font-size="11.5" fill="#495057">서브에이전트(QA)</text>
  <rect x="345" y="831" width="13" height="13" rx="3" fill="#f3effe" stroke="#7048e8"/><text x="364" y="842" font-size="11.5" fill="#495057">오케스트레이터</text>
  <rect x="478" y="831" width="13" height="13" rx="3" fill="#fff4e6" stroke="#e8590c"/><text x="497" y="842" font-size="11.5" fill="#495057">판정·수정 루프</text>
  <rect x="600" y="831" width="13" height="13" rx="3" fill="#fff0f6" stroke="#e64980"/><text x="619" y="842" font-size="11.5" fill="#495057">전송</text>
  <rect x="668" y="831" width="13" height="13" rx="3" fill="#fff" stroke="#adb5bd"/><text x="687" y="842" font-size="11.5" fill="#495057">외부 자원/대상</text>
</svg>
