<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>블로그 컴퍼니</title>
<script>(function(){try{var t=localStorage.getItem("theme")||((window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
 :root{
   --bg:#FAFAF8; --panel:#FFFFFF; --surface-2:#F4F4F1;
   --ink:#18181B; --sub:#52525B; --faint:#A1A1AA;
   --line:#E7E5E0; --line2:#F0EEEA;
   --brand:#3B3BE6; --brand-d:#2B2BC4;
   --shadow:0 1px 2px rgba(20,20,30,.04),0 1px 3px rgba(20,20,30,.05);
   --shadow-h:0 2px 6px rgba(20,20,30,.06),0 10px 28px rgba(20,20,30,.07);
   --radius:14px; --maxw:860px;
   --head-bg:rgba(250,250,248,.82);
   --font:"Pretendard","Pretendard Variable","Apple SD Gothic Neo",system-ui,"맑은 고딕","Malgun Gothic",sans-serif;
 }
 :root[data-theme="dark"]{
   --bg:#0E0E10; --panel:#161618; --surface-2:#212124;
   --ink:#ECECEE; --sub:#A1A1AA; --faint:#6B6B73;
   --line:#27272A; --line2:#1E1E21;
   --brand:#8B8BFF; --brand-d:#A5A5FF;
   --shadow:0 1px 2px rgba(0,0,0,.3); --shadow-h:0 6px 22px rgba(0,0,0,.5);
   --head-bg:rgba(14,14,16,.78);
 }
 *{box-sizing:border-box;}
 html,body{margin:0;}
 body{background:var(--bg);color:var(--ink);font-family:var(--font);
   -webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}
 a{color:inherit;text-decoration:none;}

 /* ---------- 헤더 ---------- */
 .site-head{position:sticky;top:0;z-index:50;background:var(--head-bg);
   backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
 .head-inner{max-width:var(--maxw);margin:0 auto;padding:13px 20px 0;}
 .head-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
 .brand .logo{font-size:19px;font-weight:900;letter-spacing:-.5px;display:flex;align-items:center;gap:7px;}
 .brand .logo .gt{background:linear-gradient(92deg,var(--brand),#9c36b5 55%,#e8590c);
   -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
 .brand .slogan{font-size:11.5px;color:var(--faint);font-weight:500;margin-top:2px;}
 .head-tools{display:flex;align-items:center;gap:8px;flex:none;}
 .search{position:relative;}
 .search input{width:184px;max-width:46vw;border:1px solid var(--line);background:var(--panel);color:var(--ink);
   border-radius:999px;padding:9px 14px 9px 34px;font-size:13px;font-family:inherit;outline:none;transition:.13s;}
 .search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 16%,transparent);}
 .search .mag{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:13px;pointer-events:none;}
 .tbtn{width:38px;height:38px;flex:none;border:1px solid var(--line);background:var(--panel);color:var(--ink);
   border-radius:10px;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;transition:.13s;}
 .tbtn:hover{background:var(--surface-2);}
 .topnav{display:flex;gap:7px;overflow-x:auto;margin-top:12px;padding-bottom:11px;
   scrollbar-width:none;-webkit-overflow-scrolling:touch;}
 .topnav::-webkit-scrollbar{display:none;}
 .topnav button{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--panel);
   color:var(--sub);font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;white-space:nowrap;
   padding:8px 14px;border-radius:999px;transition:.13s;flex:none;}
 .topnav button .ico{font-size:14px;}
 .topnav button .dot{width:8px;height:8px;border-radius:50%;background:var(--ac,#bbb);}
 .topnav button .cnt{font-size:11.5px;font-weight:800;color:var(--faint);}
 .topnav button:hover{background:var(--surface-2);color:var(--ink);}
 .topnav button.on{background:var(--ac,var(--brand));color:#fff;border-color:transparent;}
 .topnav button.on .cnt{color:rgba(255,255,255,.85);}
 .topnav button.on .dot{background:#fff;}

 /* ---------- 메인 ---------- */
 .main{max-width:var(--maxw);margin:0 auto;padding:26px 20px 64px;}
 .viewhead{margin:2px 2px 16px;}
 .viewhead h1{font-size:25px;font-weight:900;letter-spacing:-.6px;margin:0;}
 .viewhead .sub{margin:7px 0 0;color:var(--sub);font-size:13.5px;line-height:1.6;}
 .viewhead .sub b{color:var(--ink);font-weight:800;}

 /* ---------- 통계 스트립 ---------- */
 .stats{display:flex;gap:9px;margin:14px 2px 0;flex-wrap:wrap;}
 .stat{flex:1;min-width:96px;background:var(--panel);border:1px solid var(--line);border-radius:12px;
   padding:11px 14px;box-shadow:var(--shadow);}
 .stat .n{font-size:21px;font-weight:900;letter-spacing:-.5px;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.1;}
 .stat .l{font-size:11.5px;font-weight:700;color:var(--faint);margin-top:3px;}

 /* ---------- 정렬·보기 툴바 ---------- */
 .toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
   margin:18px 2px 14px;flex-wrap:wrap;}
 .toolbar .tcount{font-size:12.5px;font-weight:700;color:var(--faint);}
 .toolbar .tcount b{color:var(--sub);font-weight:800;}
 .tools-r{display:flex;align-items:center;gap:7px;flex:none;}
 .sbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--panel);
   color:var(--sub);font-family:inherit;font-size:12.5px;font-weight:800;cursor:pointer;
   padding:8px 13px;border-radius:10px;transition:.13s;white-space:nowrap;}
 .sbtn:hover{background:var(--surface-2);color:var(--ink);border-color:var(--faint);}
 .sbtn .ar{font-size:13px;transition:transform .2s;}
 .sbtn.asc .ar{transform:rotate(180deg);}
 .sbtn.act{color:var(--brand-d);border-color:color-mix(in srgb,var(--brand) 40%,var(--line));
   background:color-mix(in srgb,var(--brand) 9%,transparent);}

 /* NEW 뱃지 / 날짜 */
 .ribbon{position:absolute;top:0;right:0;background:linear-gradient(135deg,#ff5b5b,#ff2d6f);color:#fff;
   font-size:10.5px;font-weight:900;letter-spacing:.06em;padding:4px 10px;border-bottom-left-radius:10px;
   box-shadow:0 2px 8px rgba(255,45,111,.35);z-index:2;}
 .c-meta .edited{color:var(--faint);font-weight:700;}

 /* 갤러리(그리드) 보기 */
 .feed.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px;}
 .feed.grid .card{padding:18px 18px 17px 20px;}
 @media(max-width:620px){ .feed.grid{grid-template-columns:1fr;} }

 /* 렌더 페이드인 */
 @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
 .feed>*,.feat{animation:fadeUp .32s cubic-bezier(.4,0,.2,1) both;}
 @media(prefers-reduced-motion:reduce){.feed>*,.feat{animation:none;}}

 /* ---------- 피드 카드 ---------- */
 .feed{display:flex;flex-direction:column;gap:13px;}
 .card,.feat{position:relative;display:block;background:var(--panel);border:1px solid var(--line);
   border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;
   transition:transform .15s cubic-bezier(.4,0,.2,1),box-shadow .15s,border-color .15s;}
 .card{padding:17px 19px 17px 21px;}
 .feat{padding:24px 26px 22px 28px;border-radius:18px;
   background:
     radial-gradient(120% 140% at 100% 0%,color-mix(in srgb,var(--ac,var(--brand)) 11%,transparent) 0%,transparent 46%),
     var(--panel);}
 .card::before,.feat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ac,#bbb);}
 .feat::before{width:5px;}
 .card:hover,.feat:hover{transform:translateY(-2px);box-shadow:var(--shadow-h);}
 .c-top{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap;}
 .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;
   color:var(--ac,#666);background:var(--surface-2);border-radius:999px;padding:3px 11px 3px 9px;}
 .badge .bdot{width:6px;height:6px;border-radius:50%;background:var(--ac,#888);}
 .cat-chip{font-size:12px;font-weight:700;color:var(--sub);background:var(--surface-2);
   border:1px solid var(--line);border-radius:7px;padding:2px 9px;}
 .f-k{font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--ac,var(--brand));margin-bottom:9px;text-transform:uppercase;}
 .c-title{font-size:18.5px;font-weight:800;line-height:1.42;letter-spacing:-.02em;color:var(--ink);margin:0;
   word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
 .f-title{font-size:25px;font-weight:800;line-height:1.32;letter-spacing:-.025em;color:var(--ink);margin:0;
   word-break:keep-all;display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
 .card:hover .c-title,.feat:hover .f-title{color:var(--ac,var(--brand-d));}
 .c-ex{margin:8px 0 0;font-size:14px;line-height:1.62;color:var(--sub);word-break:keep-all;
   display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
 .f-ex{-webkit-line-clamp:3;line-clamp:3;}
 .c-meta{display:flex;align-items:center;gap:9px;margin-top:13px;font-size:12.5px;font-weight:600;color:var(--faint);flex-wrap:wrap;}
 .c-meta .date{color:var(--sub);font-weight:800;font-variant-numeric:tabular-nums;}
 .c-meta .sepd{width:3px;height:3px;border-radius:50%;background:var(--faint);}

 .empty,.loading{background:var(--panel);border:1px dashed var(--line);border-radius:var(--radius);
   padding:48px 20px;text-align:center;color:var(--sub);font-size:14px;box-shadow:var(--shadow);}

 /* ---------- 회사 소개(조직/파이프라인) ---------- */
 .about{display:flex;flex-direction:column;gap:15px;}
 .about-hero{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px 28px;box-shadow:var(--shadow);}
 .about-hero h2{margin:0 0 12px;font-size:24px;font-weight:900;letter-spacing:-.5px;}
 .about-hero p{margin:0;font-size:14.5px;line-height:1.8;color:var(--sub);word-break:keep-all;}
 .about-hero b{color:var(--ink);}
 .pipe{display:flex;flex-direction:column;gap:0;}
 .stage{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
 .stage .sh{display:flex;align-items:center;gap:9px;font-size:15.5px;font-weight:900;letter-spacing:-.3px;}
 .stage .sh .num{width:24px;height:24px;border-radius:8px;background:var(--ac,var(--brand));color:#fff;
   font-size:12.5px;font-weight:900;display:flex;align-items:center;justify-content:center;flex:none;}
 .stage .sdesc{margin:8px 0 0;color:var(--sub);font-size:12.5px;line-height:1.65;word-break:keep-all;}
 .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;}
 .chip{font-size:12.5px;font-weight:700;color:var(--sub);background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:5px 11px;}
 .chip b{color:var(--brand-d);font-weight:800;}
 .arrow{align-self:center;color:var(--faint);font-size:16px;line-height:1;padding:7px 0;opacity:.6;}

 /* ---------- 트렌드/뉴스 가판대 ---------- */
 .news{display:flex;flex-direction:column;gap:15px;}
 .news-masthead{background:#11141c;color:#fff;border-radius:18px;padding:22px 24px;box-shadow:var(--shadow);border:1px solid #1c2030;}
 .news-masthead .nm-k{font-size:11px;font-weight:800;letter-spacing:3px;color:#8b94f0;}
 .news-masthead .nm-t{font-size:23px;font-weight:900;letter-spacing:-.5px;margin:6px 0 8px;}
 .news-masthead .nm-s{font-size:13px;line-height:1.7;color:rgba(255,255,255,.74);word-break:keep-all;}
 .tcards{display:flex;flex-direction:column;gap:12px;}
 .tcard{position:relative;display:block;background:var(--panel);border:1px solid var(--line);
   border-radius:var(--radius);padding:18px 20px 16px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;overflow:hidden;}
 .tcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--ac,var(--brand));}
 .tcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-h);}
 .tcard-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
 .tbadge{font-size:12px;font-weight:800;color:#fff;background:var(--ac,var(--brand));border-radius:999px;padding:3px 11px;}
 .tdate{font-size:12.5px;font-weight:800;color:var(--faint);font-variant-numeric:tabular-nums;}
 .tcard-h{font-size:18px;line-height:1.4;font-weight:900;letter-spacing:-.4px;margin:0 0 6px;color:var(--ink);word-break:keep-all;}
 .tcard:hover .tcard-h{color:var(--ac,var(--brand-d));}
 .tcard-l{margin:0 0 10px;font-size:13.5px;line-height:1.65;color:var(--sub);word-break:keep-all;}
 .tchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
 .tchip{font-size:12px;font-weight:700;color:var(--sub);background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:4px 10px;}
 .tmore{font-size:12.5px;font-weight:800;color:var(--ac,var(--brand-d));}
 /* 뉴스레터 */
 .news-masthead.nletter{border-top:4px solid #e8590c;}
 .news-masthead.nletter .nm-k{color:#ffae6b;}
 .nsec{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:6px 4px 4px;box-shadow:var(--shadow);}
 .nsec-h{font-size:14px;font-weight:900;color:#e8590c;padding:11px 16px;border-bottom:1px solid var(--line);}
 .nitem{padding:13px 16px;border-bottom:1px solid var(--line2);}
 .nitem:last-child{border-bottom:0;}
 .nit-t{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.2px;word-break:keep-all;line-height:1.45;}
 .nit-s{font-size:13px;color:var(--sub);margin-top:4px;line-height:1.6;word-break:keep-all;}
 .nit-l{margin-top:9px;display:flex;flex-wrap:wrap;gap:7px;}
 .nlink{font-size:12px;font-weight:800;color:#e8590c;background:rgba(232,89,12,.10);
   border:1px solid rgba(232,89,12,.28);border-radius:8px;padding:4px 10px;}
 .nlink:hover{background:rgba(232,89,12,.18);}
 .foot2{color:var(--faint);font-size:12px;line-height:1.7;text-align:center;margin-top:4px;}
 .dpager{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 10px;box-shadow:var(--shadow);}
 .dpbtn{font-size:13px;font-weight:800;color:#fff;background:var(--ac,var(--brand));border:0;border-radius:9px;padding:8px 12px;cursor:pointer;font-family:inherit;flex:none;}
 .dpbtn:disabled{background:var(--line);color:var(--faint);cursor:default;}
 .dpsel{flex:1;min-width:0;font-family:inherit;font-size:13.5px;font-weight:800;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;text-align:center;cursor:pointer;}
 .dpos{font-size:12px;font-weight:800;color:var(--faint);flex:none;}
 .nm-head2{font-size:16px;font-weight:900;color:var(--ink);letter-spacing:-.3px;padding:2px 4px;word-break:keep-all;}
 .nit-d{display:inline-block;font-size:11px;font-weight:800;color:#e8590c;background:rgba(232,89,12,.10);border-radius:6px;padding:2px 8px;margin-bottom:6px;}

 .site-foot{max-width:var(--maxw);margin:0 auto;padding:22px 20px 40px;border-top:1px solid var(--line);
   color:var(--faint);font-size:12px;line-height:1.7;text-align:center;}
 .site-foot b{color:var(--sub);}

 /* ---------- 모바일 ---------- */
 @media(max-width:560px){
   .head-inner{padding:12px 15px 0;}
   .brand .slogan{display:none;}
   .search input{width:140px;}
   .main{padding:20px 15px 50px;}
   .viewhead h1{font-size:21px;}
   .feat{padding:20px 18px;}
   .f-title{font-size:21px;}
   .card{padding:15px 16px 15px 18px;}
 }
</style></head><body>
 <header class="site-head">
   <div class="head-inner">
     <div class="head-row">
       <div class="brand">
         <div class="logo">📒 <span class="gt">블로그 컴퍼니</span></div>
         <div class="slogan">기획 · 작성 · 검수 · 발행까지, 한 팀이 만드는 블로그</div>
       </div>
       <div class="head-tools">
         <div class="search" id="searchBox" style="display:none">
           <span class="mag">🔎</span><input id="q" type="search" placeholder="제목·내용 검색" autocomplete="off">
         </div>
         <button class="tbtn" id="themeToggle" title="라이트/다크 전환" aria-label="테마 전환">🌙</button>
       </div>
     </div>
     <nav class="topnav" id="nav"><button class="on" data-k="__all__"><span class="ico">🗂️</span>전체</button></nav>
   </div>
 </header>

 <main class="main">
   <div class="viewhead">
     <h1 id="viewTitle">전체 글</h1>
     <p class="sub" id="viewSub">불러오는 중…</p>
   </div>
   <div id="content"><div class="loading">목록 불러오는 중…</div></div>
 </main>
 <footer class="site-foot">
   <b>블로그 컴퍼니</b> · 발행 전 미리보기 (검색 노출 차단, noindex)<br>새 글·새 직원·트렌드는 자동 반영됩니다.
 </footer>

<script>
(function(){
 // 다크모드 토글
 const tt=document.getElementById("themeToggle");
 const setIco=()=>{ tt.textContent=document.documentElement.getAttribute("data-theme")==="dark"?"☀️":"🌙"; };
 setIco();
 tt.addEventListener("click",()=>{
   const cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
   document.documentElement.setAttribute("data-theme",cur);
   try{localStorage.setItem("theme",cur);}catch(e){}
   setIco();
 });

 const OWNER="qtdqtd002-coder",REPO="bomding-blog-preview",BRANCH="main";
 const KNOWN={ "봄딩":{tag:"게임 · 육아",accent:"#E8590C",ico:"🍊"},
               "영도":{tag:"영원한도시 · 게임",accent:"#1098AD",ico:"🏙️"} };
 const PALETTE=["#9c36b5","#0ca678","#e8a700","#d6336c","#5c7cfa","#1098ad","#e8590c"];
 const PREF=["봄딩","영도"];

 const navEl=document.getElementById("nav"),
       contentEl=document.getElementById("content"),
       titleEl=document.getElementById("viewTitle"),
       subEl=document.getElementById("viewSub"),
       searchBox=document.getElementById("searchBox"),
       qEl=document.getElementById("q");

 const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
 const enc=rel=>rel.split("/").map(encodeURIComponent).join("/");
 const toTs=d=>{ if(!d)return 0; const t=Date.parse(String(d).replace(" ","T")); return isNaN(t)?0:t; };
 const ls=(k,d)=>{ try{return localStorage.getItem(k)||d;}catch(e){return d;} };
 const lset=(k,v)=>{ try{localStorage.setItem(k,v);}catch(e){} };
 const NEW_DAYS=3, DAY=864e5;

 let POSTS=[], ACCENT={}, TREND=[], NEWS=[],
     state={view:"__all__",q:"",newsDate:"",trendDate:"",
            sortDir:ls("sortDir","desc"), gridView:ls("gridView","0")==="1"};

 const treeP=fetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`,
   {headers:{"Accept":"application/vnd.github+json"}})
  .then(r=>{if(!r.ok)throw new Error("API "+r.status);return r.json();});
 const maniP=fetch("manifest.json?ts="+Date.now()).then(r=>r.ok?r.json():{}).catch(()=>({}));
 const trendP=fetch("_trend/trend.json?ts="+Date.now()).then(r=>r.ok?r.json():{issues:[]}).catch(()=>({issues:[]}));
 const newsP=fetch("_news/news.json?ts="+Date.now()).then(r=>r.ok?r.json():{issues:[]}).catch(()=>({issues:[]}));

 Promise.all([treeP,maniP,trendP,newsP]).then(([data,manifest,trend,news])=>{
   const paths=(data.tree||[]).filter(n=>n.type==="blob"&&/\.html$/i.test(n.path)).map(n=>n.path)
     .filter(p=>p.toLowerCase()!=="index.html"&&!p.split("/").some(s=>s.startsWith(".")||s.startsWith("_")));
   if(!paths.length){ titleEl.textContent="전체 글"; subEl.textContent="아직 글이 없어요.";
     contentEl.innerHTML='<div class="empty">아직 발행된 글이 없어요.</div>'; return; }

   POSTS=paths.map(p=>{
     const a=p.split("/");
     const m=manifest[p]; const meta=(typeof m==="string")?{date:m}:(m||{});
     const author=meta.author||(a.length>=2?a[0]:"(기타)");
     const group=meta.group||(a.length>=3?a[1]:(a[1]||""));
     const topic=a.length>=3?a[2]:a[a.length-1];
     const file=a[a.length-1];
     // 최초 등록일(created)이 표기·정렬의 단일 기준. 구버전 manifest(date만)도 호환.
     const created=meta.created||meta.date||"";
     const updated=meta.updated||meta.date||created;
     return {author,group,topic,file,rel:p,created,updated,
             ts:toTs(created),uts:toTs(updated),
             title:meta.title||"",cat:meta.cat||"",excerpt:meta.excerpt||"",readmin:meta.readmin||0};
   });

   const names=[...new Set(POSTS.map(p=>p.author))];
   const ordered=PREF.filter(n=>names.includes(n)).concat(names.filter(n=>!PREF.includes(n)).sort());
   let pi=0; ordered.forEach(n=>{ ACCENT[n]=(KNOWN[n]&&KNOWN[n].accent)||PALETTE[pi++%PALETTE.length]; });

   TREND=((trend&&trend.issues)||[]).slice().sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
   NEWS=((news&&news.issues)||[]).slice().sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));

   buildNav(ordered);
   searchBox.style.display="";
   render();
 }).catch(e=>{
   titleEl.textContent="전체 글"; subEl.textContent="목록을 불러오지 못했어요.";
   contentEl.innerHTML='<div class="empty">목록을 불러오지 못했어요(잠시 후 새로고침).<br>'+esc(String(e.message||e))+'</div>';
 });

 function buildNav(ordered){
   const cnt=n=>POSTS.filter(p=>p.author===n).length;
   let html=`<button data-k="__all__"><span class="ico">🗂️</span>전체<span class="cnt">${POSTS.length}</span></button>`;
   ordered.forEach(n=>{
     const ico=(KNOWN[n]&&KNOWN[n].ico)||"✍️";
     html+=`<button data-k="${esc(n)}" style="--ac:${ACCENT[n]}"><span class="dot"></span>${ico} ${esc(n)}<span class="cnt">${cnt(n)}</span></button>`;
   });
   html+=`<button data-k="__trend__" style="--ac:#d6336c"><span class="ico">📈</span>트렌드 분석<span class="cnt">${TREND.length}</span></button>`+
         `<button data-k="__news__" style="--ac:#e8590c"><span class="ico">📰</span>게임 뉴스레터</button>`+
         `<button data-k="__about__" style="--ac:#6c5ce7"><span class="ico">🏢</span>회사 소개</button>`;
   navEl.innerHTML=html;
   const cur=navEl.querySelector(`[data-k="${state.view}"]`)||navEl.firstElementChild;
   cur&&cur.classList.add("on");
   navEl.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
     state.view=b.dataset.k; state.q=""; if(qEl)qEl.value="";
     navEl.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
     b.classList.add("on");
     render();
     window.scrollTo({top:0,behavior:"smooth"});
   }));
 }

 qEl&&qEl.addEventListener("input",()=>{ state.q=qEl.value.trim().toLowerCase(); render(); });

 const fmtDay=d=>d?String(d).split(" ")[0].replace(/-/g,"."):"";
 function postCard(p,feat){
   const ac=ACCENT[p.author]||"#888";
   const ico=(KNOWN[p.author]&&KNOWN[p.author].ico)||"✍️";
   const title=p.title||p.topic||p.file;
   const dd=p.ts?fmtDay(p.created):"—";
   const isNew=p.ts && (Date.now()-p.ts) < NEW_DAYS*DAY;
   const edited=p.uts && fmtDay(p.updated)!==fmtDay(p.created);
   const read=p.readmin?`약 ${p.readmin}분`:"";
   const ribbon=isNew?`<span class="ribbon">NEW</span>`:"";
   const top=`<div class="c-top"><span class="badge"><span class="bdot"></span>${ico} ${esc(p.author)}</span>`+
     (p.cat?`<span class="cat-chip">${esc(p.cat)}</span>`:"")+`</div>`;
   const meta=`<div class="c-meta"><span class="date">📅 ${esc(dd)} 등록</span>`+
     (edited?`<span class="sepd"></span><span class="edited">수정 ${esc(fmtDay(p.updated))}</span>`:"")+
     (read?`<span class="sepd"></span>${read}`:"")+
     (p.group?`<span class="sepd"></span>${esc(p.group)}`:"")+`</div>`;
   if(feat){
     return `<a class="feat" href="${enc(p.rel)}" style="--ac:${ac}">${ribbon}`+
       `<div class="f-k">★ 최신 글</div>${top}`+
       `<h2 class="f-title">${esc(title)}</h2>`+
       (p.excerpt?`<p class="c-ex f-ex">${esc(p.excerpt)}</p>`:"")+meta+`</a>`;
   }
   return `<a class="card" href="${enc(p.rel)}" style="--ac:${ac}">${ribbon}${top}`+
     `<h3 class="c-title">${esc(title)}</h3>`+
     (p.excerpt?`<p class="c-ex">${esc(p.excerpt)}</p>`:"")+meta+`</a>`;
 }

 function render(){
   if(state.view==="__about__"){ searchBox.style.display="none"; renderAbout(); return; }
   if(state.view==="__trend__"){ renderTrend(); return; }
   if(state.view==="__news__"){ renderNews(); return; }
   searchBox.style.display=""; if(qEl)qEl.placeholder="제목·내용 검색";
   let list = state.view==="__all__" ? POSTS : POSTS.filter(p=>p.author===state.view);
   if(state.q){ list=list.filter(p=>(p.title+" "+p.excerpt+" "+p.cat+" "+p.group+" "+p.topic).toLowerCase().includes(state.q)); }

   // 최초 등록일 기준 정렬 (동률이면 제목) — 방향 토글
   const dir = state.sortDir==="asc" ? 1 : -1;
   list = list.slice().sort((x,y)=> (x.ts-y.ts)*dir || x.title.localeCompare(y.title,"ko") );

   const who = state.view==="__all__" ? "전체 글" : esc(state.view)+" 글";
   titleEl.innerHTML = who;
   const tag = (state.view!=="__all__"&&KNOWN[state.view]) ? " · "+esc(KNOWN[state.view].tag) : "";
   const sortLabel = state.sortDir==="asc" ? "등록일 오래된순" : "등록일 최신순";
   subEl.innerHTML = `<b>${sortLabel}</b> · 총 <b>${list.length}</b>편`+tag+(state.q?` · '${esc(state.q)}' 검색`:"");

   // 통계 스트립 (전체 보기, 검색 아닐 때만)
   const statsHtml = (state.view==="__all__" && !state.q) ? statsStrip() : "";

   const desc = state.sortDir!=="asc";
   const useFeat = !state.q && desc && list.length>1;  // 최신순일 때만 피처드
   const toolbar = toolbarHtml(list.length);

   if(!list.length){ contentEl.innerHTML=statsHtml+toolbar+'<div class="empty">조건에 맞는 글이 없어요.</div>'; attachTools(); return; }

   const gridCls = state.gridView ? " grid" : "";
   let body;
   if(useFeat){
     const [first,...rest]=list;
     body=postCard(first,true)+`<div class="feed${gridCls}" style="margin-top:13px">${rest.map(p=>postCard(p,false)).join("")}</div>`;
   } else {
     body=`<div class="feed${gridCls}">${list.map(p=>postCard(p,false)).join("")}</div>`;
   }
   contentEl.innerHTML=statsHtml+toolbar+body;
   attachTools();
 }

 function statsStrip(){
   const total=POSTS.length;
   const authors=new Set(POSTS.map(p=>p.author)).size;
   const newest=POSTS.reduce((m,p)=>(p.ts>(m?m.ts:0)?p:m),null);
   const newCnt=POSTS.filter(p=>p.ts&&(Date.now()-p.ts)<NEW_DAYS*DAY).length;
   const latestStr=newest?fmtDay(newest.created):"—";
   const cell=(n,l)=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`;
   return `<div class="stats">`+cell(total,"전체 글")+cell(authors,"작성자")+
     cell(newCnt,`최근 ${NEW_DAYS}일 NEW`)+cell(latestStr,"최근 등록일")+`</div>`;
 }
 function toolbarHtml(n){
   const asc=state.sortDir==="asc";
   return `<div class="toolbar">`+
     `<div class="tcount">정렬: <b>최초 등록일</b> · ${n}편</div>`+
     `<div class="tools-r">`+
       `<button class="sbtn act${asc?" asc":""}" id="sortBtn" title="등록일 오름/내림차순">`+
         `<span class="ar">↓</span>${asc?"오래된순":"최신순"}</button>`+
       `<button class="sbtn" id="viewBtn" title="리스트/갤러리 보기">${state.gridView?"≣ 리스트":"▦ 갤러리"}</button>`+
     `</div></div>`;
 }
 function attachTools(){
   const sb=document.getElementById("sortBtn");
   if(sb)sb.addEventListener("click",()=>{ state.sortDir=state.sortDir==="asc"?"desc":"asc"; lset("sortDir",state.sortDir); render(); });
   const vb=document.getElementById("viewBtn");
   if(vb)vb.addEventListener("click",()=>{ state.gridView=!state.gridView; lset("gridView",state.gridView?"1":"0"); render(); });
 }

 function datePager(dates,cur,kind,accent){
   const i=dates.indexOf(cur);
   const opt=dates.map(d=>`<option value="${esc(d)}"${d===cur?" selected":""}>${esc(d)}</option>`).join("");
   return `<div class="dpager" style="--ac:${accent}">`+
     `<button class="dpbtn" data-pg="${kind}" data-go="older"${i<dates.length-1?"":" disabled"}>◀ 과거</button>`+
     `<select class="dpsel" data-pgsel="${kind}">${opt}</select>`+
     `<button class="dpbtn" data-pg="${kind}" data-go="newer"${i>0?"":" disabled"}>최신 ▶</button>`+
     `<span class="dpos">${dates.length-i}/${dates.length}</span></div>`;
 }
 function attachPager(kind,dates){
   const go=d=>{ if(!d)return; if(kind==="trend")state.trendDate=d; else state.newsDate=d; (kind==="trend"?renderTrend:renderNews)(); window.scrollTo({top:0,behavior:"smooth"}); };
   contentEl.querySelectorAll(`[data-pg="${kind}"]`).forEach(b=>b.addEventListener("click",()=>{
     if(b.disabled)return; const cur=kind==="trend"?state.trendDate:state.newsDate; const i=dates.indexOf(cur);
     go(b.dataset.go==="older"?dates[i+1]:dates[i-1]);
   }));
   const sel=contentEl.querySelector(`[data-pgsel="${kind}"]`); if(sel)sel.addEventListener("change",()=>go(sel.value));
 }

   }
   const dates=NEWS.map(n=>n.date);
   if(!state.newsDate||dates.indexOf(state.newsDate)<0)state.newsDate=dates[0];
   const cur=NEWS.find(n=>n.date===state.newsDate)||NEWS[0];
   const groups={}; (cur.items||[]).forEach(it=>{const c=it.cat||"기타";(groups[c]=groups[c]||[]).push(it);});
   const cats=Object.keys(groups).sort((a,b)=>{let ia=order.indexOf(a),ib=order.indexOf(b);ia=ia<0?99:ia;ib=ib<0?99:ib;return ia-ib;});
   const secHtml=c=>`<div class="nsec"><div class="nsec-h">${ICON[c]||"📰"} ${esc(c)}</div>${groups[c].map(it=>itemHtml(it,false)).join("")}</div>`;
   const total=(cur.items||[]).length;
   subEl.innerHTML=`<b>${esc(cur.date)}</b> · ${total}건 · 전체 ${dates.length}일치 누적`;
   contentEl.innerHTML=`<div class="news">${mast}<div class="nm-head2">${esc(cur.headline||"오늘의 게임 소식")}</div>${datePager(dates,cur.date,"news","#e8590c")}`+
     cats.map(secHtml).join("")+
     `<p class="foot2">트렌드 분석팀이 인벤·루리웹 등 게임 매체를 종합해 매일 오전 9시 갱신·누적합니다. 주황색 링크로 원문 기사를 확인하세요.</p></div>`;
   attachPager("news",dates);
 }
})();
</script>
