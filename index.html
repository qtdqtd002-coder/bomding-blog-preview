<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>봄딩 블로그 글 미리보기</title>
<style>
 :root{--green:#03c75a;--line:#e8e8e8;--sub:#8c8c8c;}
 body{margin:0;background:#f1f3f5;font-family:"Apple SD Gothic Neo","맑은 고딕","Malgun Gothic",sans-serif;color:#2f2f2f;}
 .wrap{max-width:720px;margin:24px auto;background:#fff;border:1px solid var(--line);border-radius:8px;padding:28px 30px 40px;}
 h1{font-size:22px;margin:0 0 4px;}
 .desc{color:var(--sub);font-size:13.5px;margin:0 0 20px;border-bottom:1px solid var(--line);padding-bottom:16px;}
 h2.game{font-size:16px;margin:26px 0 10px;padding-left:9px;border-left:4px solid var(--green);}
 ul.posts{list-style:none;padding:0;margin:0;}
 ul.posts li{padding:9px 0;border-bottom:1px solid #f0f0f0;}
 ul.posts a{text-decoration:none;color:#1f3864;font-size:15px;font-weight:600;}
 ul.posts a:hover{color:var(--green);}
 .foot{margin-top:24px;color:#aab;font-size:12px;}
 #msg{color:var(--sub);font-size:14px;}
</style></head><body>
<div class="wrap">
 <h1>봄딩 블로그 글 미리보기</h1>
 <p class="desc">게임·육아 글 미리보기 모음입니다. 항목을 클릭하면 글이 열려요.</p>
 <div id="list"><p id="msg">목록 불러오는 중…</p></div>
 <p class="foot">※ 발행 전 미리보기입니다. 검색 노출은 막아두었어요(noindex). 새 글은 업로드되면 이 목록에 자동으로 나타납니다.</p>
</div>
<script>
(async function(){
  const OWNER="qtdqtd002-coder", REPO="bomding-blog-preview", BRANCH="main";
  const listEl=document.getElementById("list");
  const enc=rel=>rel.split("/").map(encodeURIComponent).join("/");
  function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
  try{
    const api=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;
    const res=await fetch(api,{headers:{"Accept":"application/vnd.github+json"}});
    if(!res.ok) throw new Error("API "+res.status);
    const data=await res.json();
    const posts=(data.tree||[])
      .filter(n=>n.type==="blob" && /\.html$/i.test(n.path))
      .map(n=>n.path)
      .filter(p=>p.toLowerCase()!=="index.html" && !p.split("/").some(s=>s.startsWith(".")));
    if(!posts.length){ listEl.innerHTML='<p id="msg">아직 글이 없어요.</p>'; return; }
    const groups={};
    for(const p of posts.sort()){
      const parts=p.split("/");
      const game=parts.length>=2?parts[0]:"(기타)";
      const topic=parts.length>=3?parts[1]:(parts.length>=2?parts[0]:parts[parts.length-1]);
      (groups[game]=groups[game]||[]).push({topic,file:parts[parts.length-1],rel:p});
    }
    let html="";
    for(const game of Object.keys(groups)){
      html+=`<h2 class="game">${escapeHtml(game)}</h2><ul class="posts">`;
      for(const it of groups[game]) html+=`<li><a href="${enc(it.rel)}">${escapeHtml(it.topic||it.file)}</a></li>`;
      html+="</ul>";
    }
    listEl.innerHTML=html;
  }catch(e){
    listEl.innerHTML='<p id="msg">목록을 불러오지 못했어요(잠시 후 새로고침). '+escapeHtml(String(e.message||e))+'</p>';
  }
})();
</script>
</body></html>
