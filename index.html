<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>쓰담 — 당신의 글쓰기 동료</title>
<link rel="icon" type="image/svg+xml" href="app/icons/icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="app/icons/icon-192.png">
<link rel="apple-touch-icon" href="app/icons/icon-192.png">
<link rel="manifest" href="site.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="쓰담">
<meta name="theme-color" content="#4C6FFF">
<script>(function(){try{var t=localStorage.getItem("theme")||((window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
/* ============================================================
   블로그 컴퍼니 — Design System (Light/Dark · WCAG AA)
   ============================================================ */
:root{
  --bg:#FFFFFF; --bg-subtle:#F7F8FA; --surface:#FFFFFF; --surface-2:#F2F4F7;
  --ink:#16181D; --sub:#4A4F58; --muted:#6B7280;
  --line:#E5E7EB; --line-strong:#D1D5DB;
  --brand:#4C6FFF; --brand-h:#3D5AF0; --brand-weak:#EEF1FF; --on-brand:#FFFFFF;
  --warm:#FF8A5B; --warm-weak:#FFF1EA;
  --danger:#DC2626;
  --a-bomding:#E06C49; --a-bomding-weak:#FCEEE9;
  --a-yeongdo:#2F8F7F; --a-yeongdo-weak:#E6F2EF;
  --a-gemdeokku:#7C5CD1; --a-gemdeokku-weak:#F0EBFB;
  --a-trend:#C2410C; --a-news:#B45309; --a-about:#4C6FFF;
  --sh-sm:0 1px 2px rgba(16,24,40,.05);
  --sh-md:0 4px 12px rgba(16,24,40,.08);
  --sh-lg:0 12px 28px rgba(16,24,40,.12);
  --radius-sm:6px; --radius:10px; --radius-lg:14px; --radius-xl:20px;
  --maxw:940px; --head-h:60px;
  --ease:cubic-bezier(.2,.8,.2,1);
  --font:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",system-ui,"맑은 고딕",sans-serif;
}
:root[data-theme="dark"]{
  --bg:#0D0F12; --bg-subtle:#121519; --surface:#16191E; --surface-2:#1E2228;
  --ink:#F2F4F7; --sub:#A8B0BD; --muted:#6E7682;
  --line:#262B33; --line-strong:#363C46;
  --brand:#8AA0FF; --brand-h:#A7B6FF; --brand-weak:#1A2140; --on-brand:#0D0F12;
  --warm:#FF9B70; --warm-weak:#2A1C16;
  --danger:#F87171;
  --a-bomding:#F0936F; --a-bomding-weak:#2A1C16;
  --a-yeongdo:#4FB3A1; --a-yeongdo-weak:#11241F;
  --a-gemdeokku:#A78BE8; --a-gemdeokku-weak:#1F1A2E;
  --a-trend:#FB923C; --a-news:#FBBF24; --a-about:#8AA0FF;
  --sh-sm:0 1px 2px rgba(0,0,0,.3); --sh-md:0 4px 12px rgba(0,0,0,.4); --sh-lg:0 12px 28px rgba(0,0,0,.5);
}
*{box-sizing:border-box;}
html{color-scheme:light dark;}
html,body{margin:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:16px;line-height:1.65;
  word-break:keep-all;overflow-wrap:anywhere;font-feature-settings:"tnum";-webkit-font-smoothing:antialiased;
  transition:background-color .2s var(--ease),color .2s var(--ease);}
a{color:inherit;text-decoration:none;}
svg{display:block;}
.ic{width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none;}

/* ---------- 헤더 ---------- */
.site-head{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 90%,transparent);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
@supports not (backdrop-filter:blur(2px)){ .site-head{background:var(--bg);} }
.head-inner{max-width:var(--maxw);margin:0 auto;padding:0 20px;}
.head-row{height:var(--head-h);display:flex;align-items:center;justify-content:space-between;gap:12px;}
/* 로고 */
.logo{display:flex;align-items:center;gap:9px;}
.logo .mark{width:30px;height:30px;flex:none;color:var(--brand);}
.logo .wm{font-size:17px;letter-spacing:-.03em;line-height:1;white-space:nowrap;}
.logo .wm b{font-weight:800;color:var(--ink);}
.logo .wm span{font-weight:500;color:var(--sub);}
.head-tools{display:flex;align-items:center;gap:8px;flex:none;}
.search{position:relative;display:flex;align-items:center;}
.search .ic{position:absolute;left:13px;color:var(--muted);width:16px;height:16px;pointer-events:none;}
.search input{width:200px;max-width:46vw;height:40px;border:1px solid var(--line);background:var(--bg-subtle);color:var(--ink);
  border-radius:var(--radius-sm);padding:0 14px 0 38px;font-size:13.5px;font-family:inherit;outline:none;transition:.13s;}
.search input::placeholder{color:var(--muted);}
.search input:focus{background:var(--surface);border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-weak);}
.icon-btn{width:40px;height:40px;flex:none;border:1px solid var(--line);background:var(--surface);color:var(--sub);
  border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.13s;}
.icon-btn .ic{width:18px;height:18px;}
.icon-btn:hover{background:var(--bg-subtle);color:var(--ink);}
/* 앱(PWA) CTA */
.app-cta{display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 13px;flex:none;border:0;
  border-radius:var(--radius-sm);background:var(--brand);color:var(--on-brand,#fff);font-size:13.5px;font-weight:700;
  font-family:inherit;cursor:pointer;text-decoration:none;white-space:nowrap;transition:.13s;}
.app-cta .ic{width:17px;height:17px;}
.app-cta:hover{background:var(--brand-h);}
@media(max-width:560px){ .app-cta{padding:0 11px;font-size:13px;} }

/* ---------- 네비 (2그룹: 작성자 ‖ 코너) ---------- */
.topnav{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:7px 0 9px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.topnav::-webkit-scrollbar{display:none;}
.topnav button{display:inline-flex;align-items:center;gap:7px;border:1px solid transparent;background:transparent;
  color:var(--sub);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;
  height:40px;padding:0 14px;border-radius:var(--radius-sm);transition:.12s;flex:none;}
.topnav button .ic{width:16px;height:16px;}
.topnav button .dot{width:9px;height:9px;border-radius:50%;background:var(--ac,#bbb);flex:none;}
.topnav button .cnt{font-size:11.5px;font-weight:700;color:var(--muted);font-feature-settings:"tnum";}
.topnav button:hover{background:var(--bg-subtle);color:var(--ink);}
.topnav button.on{background:var(--ac,var(--brand));color:#fff;}
.topnav button.on .cnt{color:rgba(255,255,255,.85);}
.topnav button.on .dot{background:#fff;}
.topnav button.on .ic{color:#fff;}
.nav-div{width:1px;height:20px;background:var(--line-strong);margin:0 6px;flex:none;}
/* 작성팀 드롭다운 */
.topnav .teambtn .caret{width:14px;height:14px;margin-left:-1px;transition:transform .15s var(--ease);}
.teambtn[aria-expanded="true"] .caret{transform:rotate(180deg);}
.teammenu{position:fixed;z-index:60;min-width:190px;background:var(--surface);border:1px solid var(--line-strong);
  border-radius:var(--radius);box-shadow:var(--sh-lg);padding:6px;display:flex;flex-direction:column;gap:2px;
  animation:tmIn .14s var(--ease) both;}
.teammenu[hidden]{display:none;}
@keyframes tmIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
.teammenu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:1px solid transparent;
  background:transparent;color:var(--sub);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
  height:42px;padding:0 12px;border-radius:var(--radius-sm);transition:.12s;}
.teammenu button .dot{width:9px;height:9px;border-radius:50%;background:var(--ac,#bbb);flex:none;}
.teammenu button .cnt{margin-left:auto;font-size:12px;font-weight:700;color:var(--muted);font-feature-settings:"tnum";}
.teammenu button:hover{background:var(--bg-subtle);color:var(--ink);}
.teammenu button.on{background:var(--ac,var(--brand));color:#fff;}
.teammenu button.on .dot{background:#fff;}
.teammenu button.on .cnt{color:rgba(255,255,255,.85);}
.teammenu button:focus-visible{outline:none;box-shadow:var(--ring);border-color:var(--brand);}
@media(prefers-reduced-motion:reduce){.teammenu{animation:none;}}

/* ---------- 메인 ---------- */
.main{max-width:var(--maxw);margin:0 auto;padding:28px 20px 72px;}
.viewhead{margin:0 0 4px;}
.viewhead h1{font-size:clamp(22px,5.2vw,28px);font-weight:700;letter-spacing:-.02em;margin:0;line-height:1.3;}
.viewhead .sub{margin:8px 0 0;color:var(--sub);font-size:13.5px;line-height:1.55;}
.viewhead .sub b{color:var(--ink);font-weight:700;}

/* 통계 스트립 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin:18px 0 0;background:var(--line);
  border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;}
.stat{background:var(--bg-subtle);padding:14px 16px;}
.stat .n{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1.1;font-feature-settings:"tnum";}
.stat .l{font-size:11.5px;font-weight:600;color:var(--muted);margin-top:4px;}
@media(max-width:560px){ .stats{grid-template-columns:repeat(2,1fr);} }

/* 정렬·보기 툴바 */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:22px 0 16px;flex-wrap:wrap;}
.toolbar .tcount{font-size:12.5px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:6px;}
.toolbar .tcount .ic{width:15px;height:15px;}
.toolbar .tcount b{color:var(--sub);font-weight:700;}
.tools-r{display:flex;align-items:center;gap:7px;flex:none;}
.sbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-strong);background:var(--surface);
  color:var(--sub);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
  height:38px;padding:0 13px;border-radius:var(--radius-sm);transition:.12s;white-space:nowrap;}
.sbtn .ic{width:15px;height:15px;}
.sbtn:hover{background:var(--bg-subtle);color:var(--ink);}

/* ---------- 피드 ---------- */
.feed{display:flex;flex-direction:column;gap:12px;margin-top:13px;}
.feed.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
@media(max-width:620px){ .feed.grid{grid-template-columns:1fr;} }
.card,.feat{position:relative;display:block;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius-lg);box-shadow:var(--sh-sm);overflow:hidden;
  transition:transform .15s var(--ease),box-shadow .15s,border-color .15s;}
.card{padding:18px 20px 18px 22px;}
.feat{padding:24px 26px 22px 28px;border-radius:var(--radius-xl);}
.card::before,.feat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac,#bbb);}
.card:hover,.feat:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:var(--line-strong);}
.c-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.who{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--ac,var(--sub));}
.who .dot{width:8px;height:8px;border-radius:50%;background:var(--ac,#888);flex:none;}
.chip{font-size:11.5px;font-weight:600;color:var(--sub);background:var(--surface-2);
  border-radius:var(--radius-sm);padding:3px 9px;letter-spacing:.01em;}
.f-k{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.06em;
  color:var(--ac,var(--brand));margin-bottom:10px;text-transform:uppercase;}
.f-k .ic{width:13px;height:13px;}
.c-title{font-size:18px;font-weight:600;line-height:1.4;letter-spacing:-.01em;color:var(--ink);margin:0;
  display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.f-title{font-size:clamp(20px,4.6vw,23px);font-weight:700;line-height:1.36;letter-spacing:-.015em;color:var(--ink);margin:0;
  display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card:hover .c-title,.feat:hover .f-title{color:var(--brand);}
.c-ex{margin:8px 0 0;font-size:14.5px;line-height:1.62;color:var(--sub);
  display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.f-ex{font-size:15.5px;line-height:1.62;-webkit-line-clamp:2;line-clamp:2;}
.c-meta{display:flex;align-items:center;gap:14px;margin-top:14px;font-size:13px;font-weight:500;color:var(--muted);flex-wrap:wrap;}
.c-meta .m{display:inline-flex;align-items:center;gap:5px;}
.c-meta .m .ic{width:14px;height:14px;}
.c-meta .edited{color:var(--muted);opacity:.85;}
.badge-new{display:inline-flex;align-items:center;font-size:10.5px;font-weight:800;letter-spacing:.05em;line-height:1.6;
  color:var(--danger);background:color-mix(in srgb,var(--danger) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--danger) 35%,transparent);border-radius:9999px;padding:1px 8px;margin-left:auto;flex:none;}
/* 발행됨(실제 블로그 게시 확인) — 딤드 + 배지 */
.badge-pub{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;line-height:1.6;
  color:var(--sub);background:var(--surface-2);border:1px solid var(--line);border-radius:9999px;padding:1px 8px;margin-left:auto;flex:none;}
.badge-pub .ic{width:12px;height:12px;}
.card.pub,.feat.pub{opacity:.5;}
.card.pub:hover,.feat.pub:hover{opacity:.85;}
.card.pub .c-title,.feat.pub .f-title{color:var(--sub);}
.pub-hint{color:var(--muted);font-weight:600;}
.sbtn.on{background:color-mix(in srgb,var(--brand) 12%,var(--surface));border-color:color-mix(in srgb,var(--brand) 40%,var(--line-strong));color:var(--brand);}

.empty,.loading{background:var(--surface);border:1px dashed var(--line-strong);border-radius:var(--radius-lg);
  padding:48px 20px;text-align:center;color:var(--muted);font-size:14px;}

/* 페이지네이션 */
.pager{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:26px;flex-wrap:wrap;}
.pager button{min-width:38px;height:38px;padding:0 11px;border:1px solid var(--line-strong);background:var(--surface);
  color:var(--sub);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:4px;transition:.12s;font-feature-settings:"tnum";}
.pager button .ic{width:15px;height:15px;}
.pager button:hover:not(:disabled){background:var(--bg-subtle);color:var(--ink);}
.pager button.cur{background:var(--brand);color:#fff;border-color:transparent;}
.pager button:disabled{opacity:.4;cursor:default;}
.pager .gap{color:var(--muted);padding:0 2px;font-weight:700;}

/* 진입 모션 */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.feed>*,.feat{animation:fadeUp .3s var(--ease) both;}
@media(prefers-reduced-motion:reduce){.feed>*,.feat,*{animation:none!important;transition:none!important;}}

/* ---------- 회사 소개 ---------- */
.about{display:flex;flex-direction:column;gap:14px;}
.about-hero{background:var(--bg-subtle);border:1px solid var(--line);border-radius:var(--radius-xl);padding:30px 30px;}
.about-hero .mark{width:40px;height:40px;color:var(--brand);margin-bottom:14px;}
.about-hero h2{margin:0 0 12px;font-size:24px;font-weight:700;letter-spacing:-.02em;}
.about-hero p{margin:0;font-size:14.5px;line-height:1.8;color:var(--sub);}
.about-hero b{color:var(--ink);font-weight:700;}
/* 조직도 (계층) */
.org{display:flex;flex-direction:column;align-items:center;gap:0;}
.org-ceo{width:100%;max-width:540px;text-align:center;background:var(--brand);color:#fff;border-radius:var(--radius-lg);padding:16px 20px;box-shadow:var(--sh-md);}
.org-ceo .r{font-size:11px;font-weight:800;letter-spacing:.16em;opacity:.82;}
.org-ceo .n{font-size:18px;font-weight:800;margin-top:3px;letter-spacing:-.01em;}
.org-ceo .d{font-size:12.5px;line-height:1.6;opacity:.92;margin-top:7px;}
.org-conn{width:2px;height:18px;background:var(--line);}
.org-teams{width:100%;display:flex;flex-direction:column;gap:10px;}
.org-team{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--ac,var(--brand));border-radius:var(--radius-lg);padding:15px 17px;box-shadow:var(--sh-sm);}
.org-team-h{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.org-team-h .ic{width:18px;height:18px;color:var(--ac,var(--brand));flex:none;}
.org-team-n{font-size:15.5px;font-weight:800;letter-spacing:-.01em;}
.org-team-lead{font-size:11.5px;font-weight:700;color:var(--ac,var(--brand));background:var(--bg-subtle);border:1px solid var(--line);border-radius:999px;padding:3px 9px;}
.org-team-d{margin:9px 0 0;font-size:12.5px;line-height:1.6;color:var(--sub);}
.org-members{margin-top:11px;display:flex;flex-direction:column;gap:0;}
.org-mem{border-top:1px dashed var(--line);padding:8px 0;}
.org-mem:first-child{border-top:none;padding-top:2px;}
.org-mem:last-child{padding-bottom:2px;}
.org-mem-t{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.org-mem-n{font-size:13px;font-weight:700;color:var(--ink);}
.org-mem-d{margin:3px 0 0;font-size:12px;line-height:1.55;color:var(--sub);}
.org-bz{font-size:10px;font-weight:800;letter-spacing:.02em;border-radius:999px;padding:2px 8px;border:1px solid var(--line);color:var(--muted);flex:none;}
.org-bz.on{background:var(--ac,var(--brand));color:#fff;border-color:transparent;}

/* ---------- 트렌드/뉴스 ---------- */
.news{display:flex;flex-direction:column;gap:14px;}
.masthead{border-radius:var(--radius-xl);padding:24px 26px;color:#fff;background:#11141c;border:1px solid #1c2030;}
.masthead .mk{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.18em;color:#9aa3f0;}
.masthead .mk .ic{width:14px;height:14px;}
.masthead .mt{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:8px 0 8px;}
.masthead .ms{font-size:13px;line-height:1.7;color:rgba(255,255,255,.72);}
.masthead.nl{background:#1a1206;border-color:#2b1d09;}
.masthead.nl .mk{color:#fbbf6b;}
.tcards{display:flex;flex-direction:column;gap:12px;}
.tcard{position:relative;display:block;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius-lg);padding:18px 20px 16px;box-shadow:var(--sh-sm);transition:transform .15s var(--ease),box-shadow .15s;overflow:hidden;}
.tcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac,var(--brand));}
.tcard:hover{transform:translateY(-2px);box-shadow:var(--sh-md);}
.tcard-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px;}
.tbadge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#fff;background:var(--ac,var(--brand));border-radius:var(--radius-sm);padding:4px 10px;}
.tbadge .dot{width:7px;height:7px;border-radius:50%;background:#fff;}
.tdate{font-size:12.5px;font-weight:700;color:var(--muted);font-feature-settings:"tnum";}
.tcard-h{font-size:17px;line-height:1.4;font-weight:700;letter-spacing:-.01em;margin:0 0 6px;color:var(--ink);}
.tcard:hover .tcard-h{color:var(--brand);}
.tcard-l{margin:0 0 10px;font-size:13.5px;line-height:1.6;color:var(--sub);}
.tchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tchip{font-size:11.5px;font-weight:600;color:var(--sub);background:var(--surface-2);border-radius:var(--radius-sm);padding:4px 9px;}
.tmore{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:700;color:var(--brand);}
.tmore .ic{width:14px;height:14px;}
.nsec{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--sh-sm);overflow:hidden;}

/* ============================================================
   디자인 포인트 보강 (원톤 탈피) + 캘린더 + 국가 선택
   ============================================================ */
:root{
  --hero-tint:#F5F6FF; --hero-dot:rgba(79,70,229,.07);
  --body-dot:rgba(16,24,40,.022); --ring:0 0 0 3px var(--brand-weak);
  --grad-line:linear-gradient(90deg,transparent,var(--brand) 50%,transparent);
  --a-cal:#0891B2; --a-cal-weak:#E0F4F8;
}
:root[data-theme="dark"]{
  --hero-tint:#13162A; --hero-dot:rgba(129,140,248,.10);
  --body-dot:rgba(255,255,255,.015); --a-cal:#38BDF8; --a-cal-weak:#0E2230;
}
/* body 표면 텍스처(아주 옅은 도트) */
body{background-image:radial-gradient(var(--body-dot) 1px,transparent 1px);background-size:22px 22px;}
@media(max-width:560px){ body{background-image:none;} }
/* 상단 히어로 밴드 — 전체 글 뷰에서만(.main.hero) */
.main.hero .viewhead{position:relative;margin:-8px -20px 6px;padding:30px 22px 22px;border-radius:var(--radius-xl);
  background:radial-gradient(var(--hero-dot) 1.3px,transparent 1.3px) 0 0/20px 20px,linear-gradient(180deg,var(--hero-tint),transparent 80%);overflow:hidden;}
.main.hero .viewhead::before{content:"";position:absolute;left:18px;right:18px;top:0;height:2px;border-radius:2px;background:var(--grad-line);opacity:.5;}
@media(max-width:560px){ .main.hero .viewhead{margin:-6px -14px 6px;padding:24px 16px 18px;} }
/* 통계 숫자 강조 + hover */
.stat .n{color:var(--brand);} .stat:last-child .n{color:var(--ink);}
.stat{transition:background-color .14s var(--ease);} .stat:hover{background:var(--surface);}
/* 툴바 위 그라데이션 디바이더 */
.toolbar{position:relative;}
.toolbar::before{content:"";position:absolute;left:0;right:0;top:-11px;height:1px;background:linear-gradient(90deg,transparent,var(--line-strong) 18%,var(--line-strong) 82%,transparent);}
/* 카드 악센트 확장: hover 틴트 + 좌측바 굵기 + 제목 작성자색 */
.card::after,.feat::after{content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;opacity:0;
  background:radial-gradient(120% 80% at 0% 0%,color-mix(in srgb,var(--ac,var(--brand)) 9%,transparent),transparent 60%);transition:opacity .18s var(--ease);}
.card:hover::after,.feat:hover::after{opacity:1;}
.card::before,.feat::before{transition:width .16s var(--ease);}
.card:hover::before,.feat:hover::before{width:5px;}
.card:hover,.feat:hover{border-color:color-mix(in srgb,var(--ac,var(--brand)) 35%,var(--line));}
.card:hover .c-title,.feat:hover .f-title{color:var(--ac,var(--brand));}
.card>*,.feat>*{position:relative;z-index:1;}
/* 카테고리 칩에 작성자색 한 방울 */
.card .chip,.feat .chip{border-left:2px solid color-mix(in srgb,var(--ac,var(--brand)) 55%,transparent);background:color-mix(in srgb,var(--ac,var(--brand)) 7%,var(--surface-2));}
/* featured 포인트: 이브로 pill + 좌측바 그라데이션 */
.feat::before{background:linear-gradient(180deg,var(--ac,var(--brand)),color-mix(in srgb,var(--ac,var(--brand)) 55%,transparent));}
.feat .f-k{background:color-mix(in srgb,var(--ac,var(--brand)) 12%,transparent);color:var(--ac,var(--brand));padding:4px 10px;border-radius:9999px;width:max-content;}
/* focus-visible 링 통일 */
.card:focus-visible,.feat:focus-visible,.tcard:focus-visible,.cal-card a:focus-visible,
.pager button:focus-visible,.sbtn:focus-visible,.icon-btn:focus-visible,.topnav button:focus-visible,
.nlink:focus-visible,.dpbtn:focus-visible,.dpsel:focus-visible,.cseg button:focus-visible{outline:none;box-shadow:var(--ring);border-color:var(--brand);}
/* 마스트헤드 상단 글로우 */
.masthead{position:relative;overflow:hidden;}
.masthead::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(154,163,240,.6) 50%,transparent);}
.masthead.nl::before{background:linear-gradient(90deg,transparent,rgba(251,191,107,.55) 50%,transparent);}

/* ---------- 국가 선택 (뉴스레터) ---------- */
.cbar{display:flex;align-items:center;gap:10px 14px;flex-wrap:wrap;margin:2px 0 4px;}

.cseg button.on .cnt{color:var(--brand);}

/* ---------- 출시 캘린더 ---------- */
.cal{display:flex;flex-direction:column;gap:10px;}
.cal-sep{font-size:12.5px;font-weight:800;color:var(--muted);letter-spacing:.02em;margin:14px 2px 2px;}

  border-radius:var(--radius);background:var(--bg-subtle);border:1px solid var(--line);padding:8px 4px;}

.prod{margin-bottom:6px;}

   POSTS=(posts||[]).filter(p=>p&&p.rel&&!p.rel.split("/").some(s=>s.startsWith(".")||s.startsWith("_"))).map(p=>{
     const a=p.rel.split("/");
     const author=p.author||(a.length>=2?a[0]:"(기타)");
     const group=p.group||(a.length>=3?a[1]:"");
     const created=p.created||p.date||"";
     const updated=p.updated||p.date||created;
     return {author,group,rel:p.rel,topic:a.length>=3?a[2]:a[a.length-1],file:a[a.length-1],
             created,updated,ts:toTs(created),uts:toTs(updated),
             title:p.title||"",cat:p.cat||"",excerpt:p.excerpt||"",readmin:p.readmin||0,
             published:(p.published===true)||PUBSET.has(p.rel)};
   });

   const names=[...new Set(POSTS.map(p=>p.author))];
   const ordered=PREF.filter(n=>names.includes(n)).concat(names.filter(n=>!PREF.includes(n)).sort());
   ordered.forEach(n=>{ ACCENT[n]=(KNOWN[n]&&KNOWN[n].ac)||FALLBACK_AC; });

   TREND=((trend&&trend.issues)||[]).slice().sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
   NEWS=((news&&news.issues)||[]).slice().sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
   CAL=((cal&&cal.events)||[]).slice().sort((a,b)=>String(a.date||"").localeCompare(String(b.date||"")));

   buildNav(ordered);
   searchBox.style.display="";
   render();
 }).catch(e=>{
   titleEl.textContent="전체 글"; subEl.textContent="목록을 불러오지 못했어요.";
   contentEl.innerHTML='<div class="empty">목록을 불러오지 못했어요(잠시 후 새로고침).<br>'+esc(String(e&&e.message||e))+'</div>';
 });

 function buildNav(ordered){
   const cnt=n=>POSTS.filter(p=>p.author===n).length;
   const writers=ordered.slice();              // 작성자 목록(동적) — '작성팀' 드롭다운으로 묶음
   const sel=v=>'[data-k="'+String(v).replace(/["\\]/g,"\\$&")+'"]';
   let h=`<button data-k="__all__">${svg("grid")}전체<span class="cnt">${POSTS.length}</span></button>`;
   h+=`<button class="teambtn" id="teamBtn" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="teamMenu">${svg("users")}작성팀${svg("chevD","caret")}</button>`;
   h+=`<span class="nav-div" aria-hidden="true"></span>`;
   h+=`<button data-k="__trend__" style="--ac:var(--a-trend)">${svg("trend")}트렌드<span class="cnt">${TREND.length}</span></button>`+
      `<button data-k="__news__" style="--ac:var(--a-news)">${svg("news")}뉴스레터</button>`+
      `<button data-k="__calendar__" style="--ac:var(--a-cal)">${svg("calDays")}캘린더<span class="cnt">${CAL.length}</span></button>`+
      `<button data-k="__about__" style="--ac:var(--a-about)">${svg("info")}소개</button>`+
      `<button data-k="__request__" class="req-nav" style="--ac:var(--brand)">${svg("edit")}새 글 요청</button>`;
   navEl.innerHTML=h;

   const teamBtn=document.getElementById("teamBtn");
   const teamMenu=document.getElementById("teamMenu");
   teamMenu.innerHTML=writers.map(n=>`<button role="menuitem" data-k="${esc(n)}" style="--ac:${ACCENT[n]}"><span class="dot"></span>${esc(n)}<span class="cnt">${cnt(n)}</span></button>`).join("");

   const isWriter=k=>writers.indexOf(k)>=0;
   function setActive(){
     navEl.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
     teamMenu.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
     if(isWriter(state.view)){
       teamBtn.classList.add("on"); teamBtn.style.setProperty("--ac",ACCENT[state.view]||"var(--brand)");
       const mi=teamMenu.querySelector(sel(state.view)); if(mi)mi.classList.add("on");
     } else {
       teamBtn.style.removeProperty("--ac");
       const nb=navEl.querySelector(sel(state.view)); if(nb)nb.classList.add("on");
     }
   }
   window.__syncNav=setActive;   // 홈 로고 등 외부에서 활성 동기화
   setActive();

   function positionMenu(){
     const r=teamBtn.getBoundingClientRect();
     teamMenu.style.top=(r.bottom+6)+"px";
     const mw=teamMenu.offsetWidth||190;
     let left=r.left; if(left+mw>window.innerWidth-8)left=window.innerWidth-mw-8; if(left<8)left=8;
     teamMenu.style.left=left+"px";
   }
   function openMenu(){ teamMenu.hidden=false; positionMenu(); teamBtn.setAttribute("aria-expanded","true"); }
   function closeMenu(){ if(teamMenu.hidden)return; teamMenu.hidden=true; teamBtn.setAttribute("aria-expanded","false"); }
   teamBtn.addEventListener("click",e=>{ e.stopPropagation(); teamMenu.hidden?openMenu():closeMenu(); });

   const goView=k=>{ state.view=k; state.q=""; state.page=1; if(qEl)qEl.value=""; closeMenu(); setActive(); render(); window.scrollTo({top:0,behavior:"smooth"}); };
   navEl.querySelectorAll("button:not(#teamBtn)").forEach(b=>b.addEventListener("click",()=>goView(b.dataset.k)));
   teamMenu.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>goView(b.dataset.k)));

   document.addEventListener("click",e=>{ if(teamMenu.hidden)return; if(!teamMenu.contains(e.target)&&!teamBtn.contains(e.target))closeMenu(); });
   document.addEventListener("keydown",e=>{ if(e.key==="Escape")closeMenu(); });
   window.addEventListener("scroll",closeMenu,true);
   window.addEventListener("resize",closeMenu);
 }
 qEl&&qEl.addEventListener("input",()=>{ state.q=qEl.value.trim().toLowerCase(); state.page=1; render(); });

 /* ---------- 카드 ---------- */
 function postCard(p,feat){
   const ac=ACCENT[p.author]||FALLBACK_AC;
   const title=p.title||p.topic||p.file;
   const dd=p.ts?fmtDay(p.created):"—";
   const isNew=p.ts && !p.published && (Date.now()-p.ts)<NEW_MS; /* 발행된 글엔 NEW 안 붙임 */
   const edited=p.uts && fmtDay(p.updated)!==fmtDay(p.created);
   const who=`<span class="who" style="--ac:${ac}"><span class="dot"></span>${esc(p.author)}</span>`;
   const newBadge=isNew?`<span class="badge-new">NEW</span>`:"";
   const pubBadge=p.published?`<span class="badge-pub">${svg("check")}발행됨</span>`:"";
   /* 우측 슬롯 1자리: 발행됨 우선, 없으면 NEW(피처 카드는 NEW 생략) — 가운데 뜨던 발행됨을 NEW 자리로 정렬 */
   const rightBadge=pubBadge||(feat?"":newBadge);
   const top=`<div class="c-top">${who}`+(p.cat?`<span class="chip">${esc(p.cat)}</span>`:"")+rightBadge+`</div>`;
   const meta=`<div class="c-meta"><span class="m">${svg("calendar")}${esc(dd)} 등록</span>`+
     (edited?`<span class="m edited">수정 ${esc(fmtDay(p.updated))}</span>`:"")+
     (p.readmin?`<span class="m">${svg("clock")}${p.readmin}분</span>`:"")+`</div>`;
   const pubCls=p.published?" pub":"";
   if(feat){
     return `<a class="feat${pubCls}" href="${enc(p.rel)}" style="--ac:${ac}">`+
       `<div class="f-k">${svg("spark")} 최신 글</div>${top}`+
       `<h2 class="f-title">${esc(title)}</h2>`+
       (p.excerpt?`<p class="c-ex f-ex">${esc(p.excerpt)}</p>`:"")+meta+`</a>`;
   }
   return `<a class="card${pubCls}" href="${enc(p.rel)}" style="--ac:${ac}">${top}`+
     `<h3 class="c-title">${esc(title)}</h3>`+
     (p.excerpt?`<p class="c-ex">${esc(p.excerpt)}</p>`:"")+meta+`</a>`;
 }

 function render(){
   mainEl.classList.remove("hero");
   if(state.view==="__about__"){ searchBox.style.display="none"; renderAbout(); return; }
   if(state.view==="__request__"){ searchBox.style.display="none"; renderRequest(); return; }
   if(state.view==="__trend__"){ searchBox.style.display=""; renderTrend(); return; }
   if(state.view==="__news__"){ searchBox.style.display=""; renderNews(); return; }
   if(state.view==="__calendar__"){ searchBox.style.display="none"; renderCalendar(); return; }
   searchBox.style.display=""; if(qEl)qEl.placeholder="제목·내용 검색";
   mainEl.classList.toggle("hero", state.view==="__all__"&&!state.q&&state.page===1);
   let list=state.view==="__all__"?POSTS:POSTS.filter(p=>p.author===state.view);
   if(state.q){ list=list.filter(p=>(p.title+" "+p.excerpt+" "+p.cat+" "+p.group+" "+p.topic).toLowerCase().includes(state.q)); }
   const hiddenPub=list.filter(p=>p.published).length;
   if(state.hidePublished){ list=list.filter(p=>!p.published); }

   const dir=state.sortDir==="asc"?1:-1;
   list=list.slice().sort((x,y)=>(x.ts-y.ts)*dir || x.title.localeCompare(y.title,"ko"));

   const total=list.length;
   const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
   if(state.page>pages)state.page=pages; if(state.page<1)state.page=1;
   const start=(state.page-1)*PAGE_SIZE;
   const pageItems=list.slice(start,start+PAGE_SIZE);

   const who=state.view==="__all__"?"전체 글":esc(state.view)+" 글";
   titleEl.textContent=who;
   const tag=(state.view!=="__all__"&&KNOWN[state.view])?" · "+esc(KNOWN[state.view].tag):"";
   const sortLabel=state.sortDir==="asc"?"등록일 오래된순":"등록일 최신순";
   subEl.innerHTML=`<b>${sortLabel}</b> · 총 <b>${total}</b>편`+tag+(state.q?` · '${esc(state.q)}' 검색`:"")+(pages>1?` · <b>${state.page}</b>/${pages}페이지`:"");

   const statsHtml=(state.view==="__all__"&&!state.q&&state.page===1)?statsStrip():"";
   const desc=state.sortDir!=="asc";
   const useFeat=!state.q&&desc&&state.page===1&&total>1;
   const toolbar=toolbarHtml(total,hiddenPub);

   if(!total){ contentEl.innerHTML=statsHtml+toolbar+'<div class="empty">조건에 맞는 글이 없어요.</div>'; attachTools(); return; }

   const gridCls=state.gridView?" grid":"";
   let body;
   if(useFeat){ const [first,...rest]=pageItems;
     body=postCard(first,true)+(rest.length?`<div class="feed${gridCls}">${rest.map(p=>postCard(p,false)).join("")}</div>`:"");
   } else {
     body=`<div class="feed${gridCls}">${pageItems.map(p=>postCard(p,false)).join("")}</div>`;
   }
   contentEl.innerHTML=statsHtml+toolbar+body+pagerHtml(state.page,pages);
   attachTools();
 }

 function pagerHtml(page,pages){
   if(pages<=1)return"";
   const win=1, slots=[]; let last=0;
   for(let i=1;i<=pages;i++){
     if(i===1||i===pages||(i>=page-win&&i<=page+win)){
       if(last&&i-last>1)slots.push("gap"); slots.push(i); last=i;
     }
   }
   const nums=slots.map(s=> s==="gap" ? `<span class="gap">…</span>`
     : `<button data-page="${s}"${s===page?' class="cur" aria-current="page"':""}>${s}</button>`).join("");
   return `<nav class="pager" aria-label="페이지">`+
     `<button data-page="${page-1}"${page<=1?" disabled":""} aria-label="이전 페이지">${svg("chevL")}이전</button>`+
     nums+
     `<button data-page="${page+1}"${page>=pages?" disabled":""} aria-label="다음 페이지">다음${svg("chevR")}</button>`+
   `</nav>`;
 }

 function statsStrip(){
   const total=POSTS.length;
   const authors=new Set(POSTS.map(p=>p.author)).size;
   const newest=POSTS.reduce((m,p)=>(p.ts>(m?m.ts:0)?p:m),null);
   const newCnt=POSTS.filter(p=>p.ts&&!p.published&&(Date.now()-p.ts)<NEW_MS).length;
   const cell=(n,l)=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`;
   return `<div class="stats">`+cell(total,"전체 글")+cell(authors,"작성자")+
     cell(newCnt,`최근 24시간 신규`)+cell(newest?fmtDay(newest.created):"—","최근 등록일")+`</div>`;
 }
 function toolbarHtml(n,hiddenPub){
   const pubInfo=(state.hidePublished&&hiddenPub)?` · <span class="pub-hint">발행 ${hiddenPub}편 숨김</span>`:"";
   return `<div class="toolbar">`+
     `<div class="tcount">${svg("sort")}정렬 기준 <b>최초 등록일</b> · ${n}편${pubInfo}</div>`+
     `<div class="tools-r">`+
       `<button class="sbtn${state.hidePublished?" on":""}" id="pubBtn" title="발행된 글 숨기기/보기 (발행=실제 블로그에 올라간 글)">${svg(state.hidePublished?"eyeOff":"eye")}${state.hidePublished?"발행글 숨김":"발행글 보기"}</button>`+
       `<button class="sbtn" id="sortBtn" title="등록일 오름/내림차순">${svg("sort")}${state.sortDir==="asc"?"오래된순":"최신순"}</button>`+
       `<button class="sbtn" id="viewBtn" title="리스트/갤러리 보기">${svg(state.gridView?"list":"grid")}${state.gridView?"리스트":"갤러리"}</button>`+
     `</div></div>`;
 }
 function attachTools(){
   const pb=document.getElementById("pubBtn");
   if(pb)pb.addEventListener("click",()=>{ state.hidePublished=!state.hidePublished; state.page=1; lset("hidePublished",state.hidePublished?"1":"0"); render(); });
   const sb=document.getElementById("sortBtn");
   if(sb)sb.addEventListener("click",()=>{ state.sortDir=state.sortDir==="asc"?"desc":"asc"; state.page=1; lset("sortDir",state.sortDir); render(); });
   const vb=document.getElementById("viewBtn");
   if(vb)vb.addEventListener("click",()=>{ state.gridView=!state.gridView; lset("gridView",state.gridView?"1":"0"); render(); });
   contentEl.querySelectorAll(".pager button[data-page]").forEach(b=>b.addEventListener("click",()=>{
     if(b.disabled)return; const n=+b.dataset.page;
     if(n&&n!==state.page){ state.page=n; render(); window.scrollTo({top:0,behavior:"smooth"}); }
   }));
 }

 function datePager(dates,cur,kind,accent){
   const i=dates.indexOf(cur);
   const opt=dates.map(d=>`<option value="${esc(d)}"${d===cur?" selected":""}>${esc(d)}</option>`).join("");
   return `<div class="dpager" style="--ac:${accent}">`+
     `<button class="dpbtn" data-pg="${kind}" data-go="older"${i<dates.length-1?"":" disabled"}>${svg("chevL")}과거</button>`+
     `<select class="dpsel" data-pgsel="${kind}">${opt}</select>`+
     `<button class="dpbtn" data-pg="${kind}" data-go="newer"${i>0?"":" disabled"}>최신${svg("chevR")}</button>`+
     `<span class="dpos">${dates.length-i}/${dates.length}</span></div>`;
 }
 function attachPager(kind,dates){
   const go=d=>{ if(!d)return; if(kind==="trend")state.trendDate=d; else state.newsDate=d; (kind==="trend"?renderTrend:renderNews)(); window.scrollTo({top:0,behavior:"smooth"}); };
   contentEl.querySelectorAll(`[data-pg="${kind}"]`).forEach(b=>b.addEventListener("click",()=>{
     if(b.disabled)return; const cur=kind==="trend"?state.trendDate:state.newsDate; const i=dates.indexOf(cur);
     go(b.dataset.go==="older"?dates[i+1]:dates[i-1]);
   }));
   const sel=contentEl.querySelector(`[data-pgsel="${kind}"]`); if(sel)sel.addEventListener("change",()=>go(sel.value));
 }

   contentEl.innerHTML=`<div class="reqwrap">
     <div class="reqcard">
       <div class="reqcard-h">${svg("edit")}<div><div class="rc-t">새 글 요청하기</div><div class="rc-s">${connected?"백엔드 연결됨 · 접수되면 작성팀이 작성→검수→발행합니다":"백엔드 미연결 — 임시 저장만 됩니다"}</div></div></div>
       <form id="reqForm" novalidate>
         <label class="rf-l">주제 <span class="rf-req">*</span></label>
         <input id="rfTopic" class="rf-i" type="text" placeholder="예: 명조 2.0 신규 캐릭터 정보 정리" maxlength="200" required>
         <label class="rf-l">소재·참고 메모 <span class="rf-opt">(선택)</span></label>
         <textarea id="rfMaterial" class="rf-i rf-ta" placeholder="꼭 넣을 내용, 참고 링크, 톤 등 자유롭게" maxlength="2000"></textarea>
         <label class="rf-l">희망 작성자 <span class="rf-opt">(선택)</span></label>
         <select id="rfWriter" class="rf-i">${wopts}</select>
         <label class="rf-l">참고 문서 첨부 <span class="rf-opt">(선택)</span></label>
         <div class="rf-file">
           <label class="rf-fbtn" for="rfFile">${svg("paperclip")}파일 선택</label>
           <input id="rfFile" type="file" accept="${esc(REQ_CFG.ACCEPT)}" hidden>
           <span id="rfFileName" class="rf-fname">선택된 파일 없음</span>
           <button type="button" id="rfFileClear" class="rf-fclear" hidden>지우기</button>
         </div>
         <div class="rf-hint">${svg("info")} 외주처가 준 "반드시 포함/제외할 내용" 문서를 올리면, <b>이 요청 글 1건에만</b> 반드시 지킬 규칙으로 반영됩니다. (다른 글·작성 규칙엔 영향 없는 1회용) · docx·xlsx·pdf·txt·hwpx</div>
         <div class="rf-actions">
           <button type="submit" class="rf-submit">${svg("send")}요청 보내기</button>
           <button type="button" id="rfPush" class="rf-push" hidden>${svg("bell")}발행 알림 받기</button>
         </div>
         <div id="rfMsg" class="rf-msg" hidden></div>
       </form>
     </div>
     <div class="reqlist" id="reqList"></div>
   </div>`;

   const $=s=>contentEl.querySelector(s);
   let picked=null;
   const fileInput=$("#rfFile"), fname=$("#rfFileName"), fclear=$("#rfFileClear");
   fileInput.addEventListener("change",()=>{
     picked=fileInput.files&&fileInput.files[0]||null;
     if(picked && picked.size>10*1024*1024){ showMsg("파일이 너무 큽니다(최대 10MB).","err"); picked=null; fileInput.value=""; }
     fname.textContent=picked?picked.name:"선택된 파일 없음"; fclear.hidden=!picked;
   });
   fclear.addEventListener("click",()=>{ picked=null; fileInput.value=""; fname.textContent="선택된 파일 없음"; fclear.hidden=true; });

   function showMsg(t,kind){ const m=$("#rfMsg"); m.hidden=false; m.textContent=t; m.className="rf-msg"+(kind?(" "+kind):""); }
   function drawList(){
     const reqs=RequestService.list();
     const el=$("#reqList");
     if(!reqs.length){ el.innerHTML=""; return; }
     el.innerHTML=`<div class="rl-h">내 요청 (${reqs.length})</div>`+reqs.map(r=>{
       const st=REQ_STATUS_LABEL[r.status]||r.status;
       return `<div class="rl-item"><div class="rl-top"><b>${esc(r.topic||"(주제 없음)")}</b><span class="rl-st s-${esc(r.status)}">${esc(st)}</span></div>`+
         (r.material?`<div class="rl-sub">소재: ${esc(r.material.slice(0,120))}</div>`:"")+
         (r.fileName?`<div class="rl-sub">${svg("paperclip")}${esc(r.fileName)}</div>`:"")+
         `<div class="rl-meta">희망 작성자: ${esc(r.writer||"자동")} · ${esc(fmtDay(new Date(r.createdAt).toISOString().slice(0,10)))}`+
         (r.publishUrl?` · <a href="${esc(r.publishUrl)}" target="_blank" rel="noopener">발행글 보기</a>`:"")+
         `</div><button class="rl-del" data-id="${esc(r.id)}">삭제</button></div>`;
     }).join("");
     el.querySelectorAll(".rl-del").forEach(b=>b.addEventListener("click",()=>{ RequestService.remove(b.dataset.id); drawList(); }));
   }
   drawList();

   $("#reqForm").addEventListener("submit",async e=>{
     e.preventDefault();
     const topic=$("#rfTopic").value.trim(), material=$("#rfMaterial").value.trim(), writer=$("#rfWriter").value;
     if(!topic){ showMsg("주제를 입력해주세요.","err"); return; }
     const btn=e.target.querySelector(".rf-submit"); btn.disabled=true;
     showMsg("보내는 중…");
     try{
       const rec=await RequestService.submit({topic,material,writer,file:picked});
       if(rec.status==="submitted"){ showMsg("요청이 접수됐어요. 작성→검수→발행 후 알림으로 알려드릴게요.","ok"); e.target.reset(); picked=null; fname.textContent="선택된 파일 없음"; fclear.hidden=true; }
       else if(rec.status==="failed"){ showMsg("전송에 실패했어요. 파일은 다시 첨부해서 보내주세요.","err"); }
       else if(rec.status==="queued"){ showMsg("네트워크 문제로 임시 저장했어요. 연결되면 다시 시도하세요.","err"); e.target.reset(); picked=null; fname.textContent="선택된 파일 없음"; fclear.hidden=true; }
       else { showMsg("임시 저장했어요(백엔드 미연결).","ok"); e.target.reset(); picked=null; fname.textContent="선택된 파일 없음"; fclear.hidden=true; }
       drawList();
     }catch(err){ showMsg("전송 실패: "+((err&&err.message)||err),"err"); }
     finally{ btn.disabled=false; }
   });

   /* 푸시: 서비스워커가 실제 등록돼 있고 지원·설정됐을 때만 노출(미등록 시 구독 멈춤 방지) */
   (async()=>{
     if(!PushSvc.supported()||!PushSvc.configured())return;
     const reg=await navigator.serviceWorker.getRegistration().catch(()=>null);
     if(!reg)return; /* 설치형 PWA(sw.js) 등록 전이면 알림 버튼 숨김 */
     const st=await PushSvc.status().catch(()=>"unsupported");
     const pb=$("#rfPush"); if(!pb)return;
     if(st==="subscribed"){ pb.hidden=false; pb.disabled=true; pb.innerHTML=svg("check")+"알림 켜짐"; }
     else if(st==="ready"){ pb.hidden=false; pb.addEventListener("click",async()=>{ pb.disabled=true; const s=await PushSvc.subscribe().catch(()=>null); if(s){ pb.innerHTML=svg("check")+"알림 켜짐"; } else { pb.disabled=false; showMsg("알림 권한이 필요해요.","err"); } }); }
   })();
 }

 /* ---------- 트렌드 ---------- */
 function renderTrend(){
   titleEl.textContent="트렌드 브리핑"; if(qEl)qEl.placeholder="트렌드 검색 (예: 명조, 사전예약)";
   const wac=w=>ACCENT[w]||(KNOWN[w]&&KNOWN[w].ac)||"var(--brand)";
   const mast=`<div class="masthead"><div class="mk">${svg("trend")}DAILY GAME TREND</div><div class="mt">트렌드 브리핑</div><div class="ms">트렌드 분석팀이 매일 오전 9시 작성자별 추천을 발행합니다. 일자별로 쌓이며(디폴트=최신), 검색으로 지난 브리핑도 찾을 수 있어요.</div></div>`;
   if(!TREND.length){ subEl.textContent="트렌드 분석팀 · 매일 오전 9시 발행"; contentEl.innerHTML=`<div class="news">${mast}<div class="empty">아직 발행된 트렌드 브리핑이 없어요.</div></div>`; return; }
   const card=it=>{
     const ac=wac(it.writer);
     const picks=(it.picks||[]).slice(0,4).map(p=>`<span class="tchip">${esc(p)}</span>`).join("");
     return `<a class="tcard" href="${enc(it.file)}" style="--ac:${ac}">`+
       `<div class="tcard-top"><span class="tbadge"><span class="dot"></span>${esc(it.writer)} 편</span><span class="tdate">${esc(it.date||"")}</span></div>`+
       `<h3 class="tcard-h">${esc(it.headline||(it.writer+" 트렌드 브리핑"))}</h3>`+
       (it.lead?`<p class="tcard-l">${esc(it.lead)}</p>`:"")+
       (picks?`<div class="tchips">${picks}</div>`:"")+
       `<span class="tmore">브리핑 전문 보기 ${svg("arrowR")}</span></a>`;
   };
   if(state.q){
     const q=state.q;
     const hits=TREND.filter(it=>((it.headline||"")+" "+(it.lead||"")+" "+((it.picks||[]).join(" "))+" "+it.writer+" "+it.date).toLowerCase().includes(q));
     subEl.innerHTML=`'${esc(q)}' 검색 · <b>${hits.length}</b>건`;
     contentEl.innerHTML=`<div class="news">${mast}`+(hits.length?`<div class="tcards">${hits.map(card).join("")}</div>`:`<div class="empty">'${esc(q)}'에 해당하는 브리핑이 없어요.</div>`)+`</div>`;
     return;
   }
   const dates=[...new Set(TREND.map(t=>t.date))].sort((a,b)=>String(b).localeCompare(String(a)));
   if(!state.trendDate||dates.indexOf(state.trendDate)<0)state.trendDate=dates[0];
   const wOrder=w=>w==="봄딩"?0:w==="영도"?1:w==="겜더쿠"?2:3;
   const day=TREND.filter(t=>t.date===state.trendDate).slice().sort((a,b)=>wOrder(a.writer)-wOrder(b.writer));
   subEl.innerHTML=`<b>${esc(state.trendDate)}</b> 브리핑 · ${day.length}편 · 전체 ${dates.length}일치 누적`;
   contentEl.innerHTML=`<div class="news">${mast}${datePager(dates,state.trendDate,"trend","var(--a-trend)")}<div class="tcards">${day.map(card).join("")}</div></div>`;
   attachPager("trend",dates);
 }

 /* ---------- 뉴스레터 ---------- */
 const COUNTRY=[["ALL","전체"],["KR","한국"],["JP","일본"],["US","미국"]];
 const CLABEL={KR:"한국",JP:"일본",US:"미국"};
 const itemCC=it=>it.country||"KR";
 function countrySeg(items){
   const cnt=c=>c==="ALL"?items.length:items.filter(it=>itemCC(it)===c).length;
   return `<div class="cbar"><span class="ctitle">${svg("globe")}국가별</span><div class="cseg">`+
     COUNTRY.map(([c,l])=>`<button data-cc="${c}"${state.newsCountry===c?' class="on"':""}>${l}<span class="cnt">${cnt(c)}</span></button>`).join("")+
     `</div></div>`;
 }
 function attachCountry(){
   contentEl.querySelectorAll("[data-cc]").forEach(b=>b.addEventListener("click",()=>{ state.newsCountry=b.dataset.cc; renderNews(); }));
 }
 function renderNews(){
   titleEl.textContent="게임 뉴스레터"; if(qEl)qEl.placeholder="뉴스 검색 (예: 쿠폰, 콜라보, 메이플)";
   const order=["신작","사전예약","업데이트","이벤트","콜라보","쿠폰","e스포츠","업계","업계심층","기타"];
   const ICON={"신작":"spark","사전예약":"calendar","업데이트":"refresh","이벤트":"gift","콜라보":"users","쿠폰":"ticket","e스포츠":"trophy","업계":"chart","업계심층":"building","기타":"news"};
   const mast=`<div class="masthead nl"><div class="mk">${svg("news")}DAILY GAME NEWS</div><div class="mt">게임 뉴스레터</div><div class="ms">매일 오전 9시, 한국·일본·미국 대표 매체의 게임 소식을 요약+원문 링크로 일자별 누적합니다. <b>국가별</b>로 골라 보고, 검색으로 지난 소식도 찾을 수 있어요.</div></div>`;
   if(!NEWS.length){ subEl.textContent="트렌드 분석팀 · 매일 오전 9시 갱신"; contentEl.innerHTML=`<div class="news">${mast}<div class="empty">아직 발행된 뉴스레터가 없어요.</div></div>`; return; }
   const cc=state.newsCountry, byCC=arr=>cc==="ALL"?arr:arr.filter(it=>itemCC(it)===cc);
   const itemHtml=(it,showDate)=>{
     const links=(it.links||[]).map(l=>`<a class="nlink" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)} ${svg("arrowUR")}</a>`).join("");
     const cflag=(itemCC(it)!=="KR")?`<span class="chip" style="margin-left:6px">${esc(CLABEL[itemCC(it)]||itemCC(it))}</span>`:"";
     return `<div class="nitem">`+(showDate?`<span class="nit-d">${esc(it.date)} · ${esc(it.cat||"기타")}</span>`:"")+
       `<div class="nit-t">${esc(it.title)}${cflag}</div>`+
       (it.summary?`<div class="nit-s">${esc(it.summary)}</div>`:"")+
       (links?`<div class="nit-l">${links}</div>`:"")+`</div>`;
   };
   if(state.q){
     const q=state.q; const all=[];
     NEWS.forEach(iss=>(iss.items||[]).forEach(it=>{ if(((it.title||"")+" "+(it.summary||"")+" "+(it.cat||"")).toLowerCase().includes(q)) all.push(Object.assign({},it,{date:iss.date})); }));
     const hits=byCC(all);
     subEl.innerHTML=`'${esc(q)}' 검색 · <b>${hits.length}</b>건`+(cc!=="ALL"?` · ${CLABEL[cc]}`:"");
     contentEl.innerHTML=`<div class="news">${mast}${countrySeg(all)}`+(hits.length?`<div class="nsec"><div class="nsec-h">${svg("search")} '${esc(q)}' 검색 결과</div>${hits.map(it=>itemHtml(it,true)).join("")}</div>`:`<div class="empty">'${esc(q)}'에 해당하는 소식이 없어요.</div>`)+`</div>`;
     attachCountry(); return;
   }
   const dates=NEWS.map(n=>n.date);
   if(!state.newsDate||dates.indexOf(state.newsDate)<0)state.newsDate=dates[0];
   const cur=NEWS.find(n=>n.date===state.newsDate)||NEWS[0];
   const allItems=cur.items||[]; const items=byCC(allItems);
   const groups={}; items.forEach(it=>{const c=it.cat||"기타";(groups[c]=groups[c]||[]).push(it);});
   const cats=Object.keys(groups).sort((a,b)=>{let ia=order.indexOf(a),ib=order.indexOf(b);ia=ia<0?99:ia;ib=ib<0?99:ib;return ia-ib;});
   const secHtml=c=>`<div class="nsec"><div class="nsec-h">${svg(ICON[c]||"news")}${esc(c)}</div>${groups[c].map(it=>itemHtml(it,false)).join("")}</div>`;
   subEl.innerHTML=`<b>${esc(cur.date)}</b> · ${items.length}건`+(cc!=="ALL"?` · ${CLABEL[cc]}`:"")+` · 전체 ${dates.length}일치 누적`;
   contentEl.innerHTML=`<div class="news">${mast}<div class="nm-head2">${esc(cur.headline||"오늘의 게임 소식")}</div>${countrySeg(allItems)}${datePager(dates,cur.date,"news","var(--a-news)")}`+
     (cats.length?cats.map(secHtml).join(""):`<div class="empty">${cc!=="ALL"?CLABEL[cc]+" 소식이 이 날짜엔 없어요.":"소식이 없어요."}</div>`)+
     `<p class="foot2">트렌드 분석팀이 한국(인벤·루리웹·게임메카·디스이즈게임·게임동아·경향게임스 등)·일본(Famitsu·4Gamer·AUTOMATON 등)·미국(IGN·GameSpot·Polygon 등) 매체를 종합·번역해 매일 갱신합니다.</p></div>`;
   attachPager("news",dates); attachCountry();
 }

 /* ---------- 출시 캘린더 ---------- */
 function renderCalendar(){
   titleEl.textContent="출시 캘린더";
   const mast=`<div class="masthead" style="background:#0b1a20;border-color:#123842"><div class="mk" style="color:#67e8f9">${svg("calDays")}RELEASE CALENDAR</div><div class="mt">출시 캘린더</div><div class="ms">앞으로의 신작·사전예약·대형 업데이트·콜라보 일정을 D-day 타임라인으로 모았습니다. 트렌드 분석팀이 매일 검증해 갱신합니다.</div></div>`;
   if(!CAL.length){ subEl.textContent="트렌드 분석팀 · 매일 갱신"; contentEl.innerHTML=`<div class="news">${mast}<div class="empty">등록된 일정이 없어요.</div></div>`; return; }
   const TC={"출시":"var(--brand)","콜라보":"var(--a-bomding)","업데이트":"var(--a-yeongdo)","행사":"var(--a-news)","사전예약시작":"var(--a-trend)","사전예약마감":"var(--a-trend)","테스트":"var(--a-gemdeokku)"};
   const now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
   const ddText=ts=>{ const d=Math.round((ts-today)/DAY); return d===0?"D-DAY":(d>0?"D-"+d:"지남"); };
   const md=ds=>{ const p=String(ds).split("-"); return p.length>=3?(+p[1])+"/"+(+p[2]):ds; };
   const rows=CAL.map(e=>{
     const ts=toTs(e.date), past=ts<today, isToday=ts===today, tc=TC[e.type]||"var(--a-cal)";
     const meta=[e.genre,e.publisher].filter(Boolean).join(" · ");
     return {past,html:`<div class="cal-row${past?" past":""}${isToday?" cal-today":""}">`+
       `<div class="cal-dday"><span class="dd">${ddText(ts)}</span><span class="md">${esc(md(e.date))}</span></div>`+
       `<div class="cal-card"><div class="cal-top"><span class="cal-type" style="--tc:${tc}">${esc(e.type||"일정")}</span>`+
         (e.platform?`<span class="cal-plat">${esc(e.platform)}</span>`:"")+`</div>`+
         `<div class="cal-title">${esc(e.title||"")}</div>`+
         (meta?`<div class="cal-meta">${esc(meta)}</div>`:"")+
         (e.note?`<div class="cal-note">${esc(e.note)}</div>`:"")+
         (e.link?`<a class="cal-link" href="${esc(e.link)}" target="_blank" rel="noopener">출처 보기 ${svg("arrowUR")}</a>`:"")+
       `</div></div>`};
   });
   const up=rows.filter(r=>!r.past), pst=rows.filter(r=>r.past);
   subEl.innerHTML=`다가오는 일정 <b>${up.length}</b>건 · 전체 ${CAL.length}건`;
   contentEl.innerHTML=`<div class="news">${mast}<div class="cal">`+
     (up.length?up.map(r=>r.html).join(""):`<div class="empty">다가오는 일정이 없어요.</div>`)+
     (pst.length?`<div class="cal-sep">지난 일정</div>`+pst.map(r=>r.html).join(""):"")+
     `</div></div>`;
 }
})();
</script>
</body></html>
