<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>쓰담 — 당신의 글쓰기 동료</title>
<link rel="icon" type="image/svg+xml" href="app/icons/icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="app/icons/icon-192.png">
<link rel="apple-touch-icon" href="app/icons/icon-192.png">
<link rel="manifest" href="site.webmanifest">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="쓰담">

<meta name="theme-color" content="#0C0E11" media="(prefers-color-scheme: dark)">
<script>(function(){try{var t=localStorage.getItem("theme")||((window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
/* ============================================================
   블로그 컴퍼니 — Design System (Light/Dark · WCAG AA)
   ============================================================ */
/* ============================================================
   쓰담 운영 허브 — Design System v2 ("따뜻한 관제탑")
   재구축 원칙: 위계 > 색. 흰 surface + 1px 보더 + 절제된 그림자.
   인디고-바이올렛(#4C6FFF) 셸/헤더/상태, 코랄(#FF6F52) 온기 포인트.
   작성자 색(--ac)은 출처 전용 — side-stripe 제거, 닷·필·풀틴트·언더라인으로 표현.
   AA: 흰 글자가 올라가는 accent 면은 --ac를 직접 쓰지 않고 color-mix로 어둡게(--ac-fill).
   ============================================================ */
:root{
  /* 중립 램프 */
  --bg:#FFFFFF; --bg-subtle:#F6F7F9; --surface:#FFFFFF; --surface-2:#F1F3F6;
  --ink:#15171C; --sub:#474C55; --muted:#666B75;
  --line:#E6E8EC; --line-strong:#D2D6DD;
  /* 브랜드(코발트-인디고 #4C6FFF로 통일) */
  --brand:#4C6FFF; --brand-h:#3A5AEB; --brand-ink:#3A5AEB; --brand-solid:#4361F5; --brand-weak:#ECF0FF; --brand-tint:#F4F6FF; --on-brand:#FFFFFF;
  /* 온기(코랄) — 포인트로만 */
  --warm:#FF6F52; --warm-h:#F2583A; --warm-weak:#FFEEE9;
  --danger:#DC2626;
  /* 작성자 액센트(출처 전용) + weak 면 */
  --a-bomding:#E06C49; --a-bomding-weak:#FCEEE9;
  --a-yeongdo:#2F8F7F; --a-yeongdo-weak:#E6F2EF;
  --a-gemdeokku:#7C5CD1; --a-gemdeokku-weak:#F0EBFB;
  --a-yeonbom:#4A86C5; --a-yeonbom-weak:#E7F0F9;
  --a-trend:#C2410C; --a-news:#B45309; --a-about:#4C6FFF; --a-queue:#0E7490; --a-ops:#0F766E;
  /* 상태색 */
  --ok:#1FAA6C; --ok-weak:#E4F6ED; --warn:#C2810C; --warn-weak:#FBF1DC; --bad:#DC2626; --bad-weak:#FCEAEA;
  /* AA accent 채움면(흰 글자용) / 면 위 글자색 — 라이트=어둡게+흰글자 */
  --ac-mixfloor:#15171C;          /* color-mix 바닥색(라이트) */
  --ac-fg:#FFFFFF;                /* accent 채움면 위 글자색(라이트) */
  /* 그림자 — 차갑지 않게 살짝 인디고 온도 */
  --sh-sm:0 1px 2px rgba(20,24,46,.05);
  --sh-md:0 6px 18px rgba(20,24,46,.08);
  --sh-lg:0 16px 38px rgba(30,30,75,.16);
  --sh-ring:0 0 0 3px var(--brand-weak);
  --radius-sm:8px; --radius:12px; --radius-lg:16px; --radius-xl:22px;
  --maxw:940px; --head-h:60px;
  /* 모션 — ease-out(quart/expo) */
  --ease:cubic-bezier(.22,1,.36,1);
  --ease-soft:cubic-bezier(.33,.86,.34,1);
  /* z-index 시맨틱 스케일 */
  --z-head:50; --z-menu:60; --z-fab:80; --z-admchip:90; --z-pop:120; --z-modal:200; --z-toast:220;
  --font:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",system-ui,"맑은 고딕",sans-serif;
}
/* accent 채움면(흰 글자가 올라가는 곳 전용) — --ac 80% + ink로 어둡게 → 흰글자 AA(4.56~7.07) */
:root{ --ac-fill:color-mix(in srgb, var(--ac,var(--brand)) 80%, var(--ac-mixfloor)); }
/* accent 글자색(밝은 surface 위 텍스트 전용) — --ac 72% + ink로 어둡게 → 텍스트 AA(4.93~7.67) */
:root{ --ac-ink:color-mix(in srgb, var(--ac,var(--brand)) 72%, var(--ac-mixfloor)); }
:root[data-theme="dark"]{
  --bg:#0C0E11; --bg-subtle:#111418; --surface:#15181D; --surface-2:#1C2026;
  --ink:#F1F3F7; --sub:#A7AFBC; --muted:#868E9C;
  --line:#252A32; --line-strong:#363C46;
  --brand:#8FA0FF; --brand-h:#A6B3FF; --brand-ink:#8FA0FF; --brand-solid:#8FA0FF; --brand-weak:#1C2342; --brand-tint:#141829; --on-brand:#0C0E11;
  --warm:#FF8868; --warm-h:#FF9C80; --warm-weak:#2A1813;
  --danger:#F87171;
  --a-bomding:#F0936F; --a-bomding-weak:#2A1C16;
  --a-yeongdo:#4FB3A1; --a-yeongdo-weak:#11241F;
  --a-gemdeokku:#A78BE8; --a-gemdeokku-weak:#1F1A2E;
  --a-yeonbom:#6FA6DD; --a-yeonbom-weak:#14202E;
  --a-trend:#FB923C; --a-news:#FBBF24; --a-about:#8FA0FF; --a-queue:#22D3EE; --a-ops:#2DD4BF;
  --ok:#34D399; --ok-weak:#10241D; --warn:#FBBF24; --warn-weak:#2A2210; --bad:#F87171; --bad-weak:#2A1414;
  /* 다크: accent 채움면은 밝은 accent 그대로(--ac) + 어두운 글자 → AA 통과(6.86~11.5) */
  --ac-fg:#0C0E11;
  --sh-sm:0 1px 2px rgba(0,0,0,.32); --sh-md:0 4px 14px rgba(0,0,0,.42); --sh-lg:0 14px 32px rgba(0,0,0,.55);
  --sh-ring:0 0 0 3px color-mix(in srgb, var(--brand) 38%, transparent);
}
:root[data-theme="dark"]{ --ac-fill:var(--ac,var(--brand)); }
/* 다크: 밝은 accent는 어두운 bg 위 텍스트로 이미 6.8~11.5 통과 → --ac 그대로 */
:root[data-theme="dark"]{ --ac-ink:var(--ac,var(--brand)); }
/* ★fix(2026-06-22 게이트 환류): 파생 accent 토큰을 --ac를 든 요소에서 재계산해야 요소 인라인 --ac(작성자색) override가 전파된다. :root 정의(위)는 --ac 미설정 폴백용. 자식은 상속. */
[style*="--ac:"]{ --ac-fill:color-mix(in srgb, var(--ac,var(--brand)) 80%, var(--ac-mixfloor)); --ac-ink:color-mix(in srgb, var(--ac,var(--brand)) 72%, var(--ac-mixfloor)); }
:root[data-theme="dark"] [style*="--ac:"]{ --ac-fill:var(--ac,var(--brand)); --ac-ink:var(--ac,var(--brand)); }
*{box-sizing:border-box;}
html{color-scheme:light dark;}
html,body{margin:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:16px;line-height:1.65;
  word-break:keep-all;overflow-wrap:anywhere;font-feature-settings:"tnum";-webkit-font-smoothing:antialiased;
  transition:background-color .2s var(--ease),color .2s var(--ease);}
a{color:inherit;text-decoration:none;}
svg{display:block;}
.ic{width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none;}

/* ---------- 헤더 ---------- */
.site-head{position:sticky;top:0;z-index:var(--z-head);background:var(--bg);border-bottom:1px solid var(--line);}
.head-inner{max-width:var(--maxw);margin:0 auto;padding:0 20px;}
.head-row{height:var(--head-h);display:flex;align-items:center;justify-content:space-between;gap:12px;}
/* 로고 */
.logo{display:flex;align-items:center;gap:9px;}
.logo .mark{width:30px;height:30px;flex:none;color:var(--brand);}
.logo .wm{font-size:17px;letter-spacing:-.03em;line-height:1;white-space:nowrap;}
.logo .wm b{font-weight:800;color:var(--ink);}
.logo .wm span{font-weight:500;color:var(--sub);}
.head-tools{display:flex;align-items:center;gap:8px;flex:none;}
.search{position:relative;display:flex;align-items:center;}
.search .ic{position:absolute;left:13px;color:var(--muted);width:16px;height:16px;pointer-events:none;}
.search input{width:200px;max-width:46vw;height:40px;border:1px solid var(--line);background:var(--bg-subtle);color:var(--ink);
  border-radius:var(--radius-sm);padding:0 14px 0 38px;font-size:13.5px;font-family:inherit;outline:none;transition:.13s;}
.search input::placeholder{color:var(--muted);}
.search input:focus{background:var(--surface);border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-weak);}
.icon-btn{width:40px;height:40px;flex:none;border:1px solid var(--line);background:var(--surface);color:var(--sub);
  border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.13s;}
.icon-btn .ic{width:18px;height:18px;}
.icon-btn:hover{background:var(--bg-subtle);color:var(--ink);}
/* 앱(PWA) CTA */
.app-cta{display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 13px;flex:none;border:0;
  border-radius:var(--radius-sm);background:var(--brand-solid);color:var(--on-brand);font-size:13.5px;font-weight:700;
  font-family:inherit;cursor:pointer;text-decoration:none;white-space:nowrap;transition:.13s;}
.app-cta .ic{width:17px;height:17px;}
.app-cta:hover{background:var(--brand-h);}
@media(max-width:560px){ .app-cta{padding:0 11px;font-size:13px;} }

/* ---------- 네비 (2그룹: 작성자 ‖ 코너) ---------- */
.topnav{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:7px 0 9px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.topnav::-webkit-scrollbar{display:none;}
.topnav button{display:inline-flex;align-items:center;gap:7px;border:1px solid transparent;background:transparent;
  color:var(--sub);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;
  height:40px;padding:0 14px;border-radius:var(--radius-sm);transition:.12s;flex:none;}
.topnav button .ic{width:16px;height:16px;}
.topnav button .dot{width:9px;height:9px;border-radius:50%;background:var(--ac,#bbb);flex:none;}
.topnav button .cnt{font-size:11.5px;font-weight:700;color:var(--muted);font-feature-settings:"tnum";}
.topnav button:hover{background:var(--bg-subtle);color:var(--ink);}
/* 활성 = AA 안전 채움면(--ac-fill) + --ac-fg 글자 + 하단 컬러 언더라인(작성자색 강화) */
.topnav button.on{background:var(--ac-fill,var(--brand));color:var(--ac-fg);position:relative;}
.topnav button.on .cnt{color:var(--ac-fg);opacity:.82;}
.topnav button.on .dot{background:var(--ac-fg);}
.topnav button.on .ic{color:var(--ac-fg);}
.nav-div{width:1px;height:20px;background:var(--line-strong);margin:0 6px;flex:none;}
/* 작성팀 드롭다운 */
.topnav .teambtn .caret{width:14px;height:14px;margin-left:-1px;transition:transform .15s var(--ease);}
.teambtn[aria-expanded="true"] .caret{transform:rotate(180deg);}
.teammenu{position:fixed;z-index:var(--z-menu);min-width:190px;background:var(--surface);border:1px solid var(--line-strong);
  border-radius:var(--radius);box-shadow:var(--sh-lg);padding:6px;display:flex;flex-direction:column;gap:2px;
  animation:tmIn .14s var(--ease) both;}
.teammenu[hidden]{display:none;}
@keyframes tmIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
.teammenu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:1px solid transparent;
  background:transparent;color:var(--sub);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
  height:42px;padding:0 12px;border-radius:var(--radius-sm);transition:.12s;}
.teammenu button .dot{width:9px;height:9px;border-radius:50%;background:var(--ac,#bbb);flex:none;}
.teammenu button .cnt{margin-left:auto;font-size:12px;font-weight:700;color:var(--muted);font-feature-settings:"tnum";}
.teammenu button:hover{background:var(--bg-subtle);color:var(--ink);}
.teammenu button.on{background:var(--ac-fill,var(--brand));color:var(--ac-fg);}
.teammenu button.on .dot{background:var(--ac-fg);}
.teammenu button.on .cnt{color:var(--ac-fg);opacity:.82;}
.teammenu button:focus-visible{outline:none;box-shadow:var(--sh-ring);border-color:var(--brand);}
@media(prefers-reduced-motion:reduce){.teammenu{animation:none;}}
/* 네비 그룹 라벨 + 인사이트 칩(비활성에도 그룹 색) */
.nav-grp{flex:none;align-self:center;font-size:11px;font-weight:800;color:var(--muted);
  letter-spacing:.03em;padding:0 4px;white-space:nowrap;}
.topnav button.nav-corner{color:var(--ac);}
.topnav button.nav-corner .ic{color:var(--ac);}
.topnav button.nav-corner .cnt{color:var(--ac);opacity:.7;}
.topnav button.nav-corner:hover{background:var(--bg-subtle);}
.topnav button.nav-corner.on{background:var(--ac-fill);color:var(--ac-fg);}
.topnav button.nav-corner.on .ic,.topnav button.nav-corner.on .cnt{color:var(--ac-fg);opacity:1;}
/* 드롭다운 메뉴: 아이콘 색 + 구분선(아카이브 분리) */
.teammenu button .ic{width:18px;height:18px;color:var(--ac,var(--brand));flex:none;}
.teammenu button.on .ic{color:#fff;}
.tm-sep{height:1px;background:var(--line);margin:5px 6px;}
/* 새 글 요청 FAB(우하단 상시) */
.fab{position:fixed;right:22px;bottom:22px;z-index:var(--z-fab);display:inline-flex;align-items:center;gap:8px;
  height:54px;padding:0 22px 0 19px;border:none;border-radius:27px;background:var(--brand-solid);color:var(--on-brand);
  font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;box-shadow:var(--sh-lg);
  transition:transform .18s var(--ease),background .18s,box-shadow .18s;}
.fab .ic{width:20px;height:20px;}
.fab:hover{background:var(--brand-h);transform:translateY(-2px);box-shadow:var(--sh-lg),0 4px 10px rgba(30,30,75,.12);}
.fab:active{transform:translateY(0);}
.fab:focus-visible{outline:none;box-shadow:var(--sh-lg),var(--sh-ring);}
@media(max-width:560px){ .fab{right:16px;bottom:16px;height:52px;padding:0 19px 0 17px;font-size:14.5px;} }

/* ---------- 메인 ---------- */
.main{max-width:var(--maxw);margin:0 auto;padding:28px 20px 72px;}
.viewhead{margin:0 0 4px;}
.viewhead h1{font-size:clamp(22px,5.2vw,28px);font-weight:700;letter-spacing:-.02em;margin:0;line-height:1.3;}
.viewhead .sub{margin:8px 0 0;color:var(--sub);font-size:13.5px;line-height:1.55;}
.viewhead .sub b{color:var(--ink);font-weight:700;}

/* 통계 스트립 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin:18px 0 0;background:var(--line);
  border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;}
.stat{background:var(--bg-subtle);padding:14px 16px;}
.stat .n{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1.1;font-feature-settings:"tnum";}
.stat .l{font-size:11.5px;font-weight:600;color:var(--muted);margin-top:4px;}
@media(max-width:560px){ .stats{grid-template-columns:repeat(2,1fr);} }

/* 정렬·보기 툴바 */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:22px 0 16px;flex-wrap:wrap;}
.toolbar .tcount{font-size:12.5px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:6px;}
.toolbar .tcount .ic{width:15px;height:15px;}
.toolbar .tcount b{color:var(--sub);font-weight:700;}
.tools-r{display:flex;align-items:center;gap:7px;flex:none;}
.sbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-strong);background:var(--surface);
  color:var(--sub);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
  height:38px;padding:0 13px;border-radius:var(--radius-sm);transition:.12s;white-space:nowrap;}
.sbtn .ic{width:15px;height:15px;}
.sbtn:hover{background:var(--bg-subtle);color:var(--ink);}

/* ---------- 피드 ---------- */
.feed{display:flex;flex-direction:column;gap:12px;margin-top:13px;}
.feed.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
@media(max-width:620px){ .feed.grid{grid-template-columns:1fr;} }
.card,.feat{position:relative;display:block;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius-lg);box-shadow:var(--sh-sm);overflow:hidden;
  transition:transform .18s var(--ease),box-shadow .18s,border-color .18s;}
.card{padding:18px 20px;}
.feat{padding:24px 26px 22px;border-radius:var(--radius-xl);}
/* ★ side-stripe(::before width:3px) 제거 — 작성자색 구분은 선두 닷/필(.who)·hover 풀틴트·제목색으로 */
.card:hover,.feat:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:var(--line-strong);}
.c-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.who{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--ac-ink,var(--sub));}
.who .dot{width:8px;height:8px;border-radius:50%;background:var(--ac,#888);flex:none;}
.chip{font-size:11.5px;font-weight:600;color:var(--sub);background:var(--surface-2);
  border-radius:var(--radius-sm);padding:3px 9px;letter-spacing:.01em;}
.f-k{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.06em;
  color:var(--ac-ink,var(--brand));margin-bottom:10px;text-transform:uppercase;}
.f-k .ic{width:13px;height:13px;}
.c-title{font-size:18px;font-weight:600;line-height:1.4;letter-spacing:-.01em;color:var(--ink);margin:0;
  display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.f-title{font-size:clamp(20px,4.6vw,23px);font-weight:700;line-height:1.36;letter-spacing:-.015em;color:var(--ink);margin:0;
  display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.c-ex{margin:8px 0 0;font-size:14.5px;line-height:1.62;color:var(--sub);
  display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.f-ex{font-size:15.5px;line-height:1.62;-webkit-line-clamp:2;line-clamp:2;}
.c-meta{display:flex;align-items:center;gap:14px;margin-top:14px;font-size:13px;font-weight:500;color:var(--muted);flex-wrap:wrap;}
.c-meta .m{display:inline-flex;align-items:center;gap:5px;}
.c-meta .m .ic{width:14px;height:14px;}
.c-meta .edited{color:var(--muted);opacity:.85;}
.badge-new{display:inline-flex;align-items:center;font-size:10.5px;font-weight:800;letter-spacing:.05em;line-height:1.6;
  color:var(--danger);background:color-mix(in srgb,var(--danger) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--danger) 35%,transparent);border-radius:9999px;padding:1px 8px;margin-left:auto;flex:none;}
/* 발행됨(실제 블로그 게시 확인) — 딤드 + 배지 */
.badge-pub{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;line-height:1.6;
  color:var(--sub);background:var(--surface-2);border:1px solid var(--line);border-radius:9999px;padding:1px 8px;margin-left:auto;flex:none;}
.badge-pub .ic{width:12px;height:12px;}
.card.pub,.feat.pub{opacity:.5;}
.card.pub:hover,.feat.pub:hover{opacity:.85;}
.card.pub .c-title,.feat.pub .f-title{color:var(--sub);}
.pub-hint{color:var(--muted);font-weight:600;}
.sbtn.on{background:color-mix(in srgb,var(--brand) 12%,var(--surface));border-color:color-mix(in srgb,var(--brand) 40%,var(--line-strong));color:var(--brand-ink);}

.empty,.loading{background:var(--surface);border:1px dashed var(--line-strong);border-radius:var(--radius-lg);
  padding:48px 20px;text-align:center;color:var(--muted);font-size:14px;}

/* 페이지네이션 */
.pager{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:26px;flex-wrap:wrap;}
.pager button{min-width:38px;height:38px;padding:0 11px;border:1px solid var(--line-strong);background:var(--surface);
  color:var(--sub);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:4px;transition:.12s;font-feature-settings:"tnum";}
.pager button .ic{width:15px;height:15px;}
.pager button:hover:not(:disabled){background:var(--bg-subtle);color:var(--ink);}
.pager button.cur{background:var(--brand-solid);color:var(--on-brand);border-color:transparent;}
.pager button:disabled{opacity:.4;cursor:default;}
.pager .gap{color:var(--muted);padding:0 2px;font-weight:700;}

/* 진입 모션 — ease-out + 의도적 stagger(앞쪽 카드 몇 개만, 과하지 않게).
   주의: 기본 가시 위 enhance — 콘텐츠는 처음부터 보이고 살짝 떠오를 뿐(탭 전환 시 가림 없음). */
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}
.feed>*,.feat{animation:fadeUp .34s var(--ease) both;}
.feed>*:nth-child(1){animation-delay:0ms;}
.feed>*:nth-child(2){animation-delay:34ms;}
.feed>*:nth-child(3){animation-delay:68ms;}
.feed>*:nth-child(4){animation-delay:96ms;}
.feed>*:nth-child(n+5){animation-delay:120ms;}
@media(prefers-reduced-motion:reduce){
  .feed>*,.feat,*{animation:none!important;transition:none!important;}
  /* 모션 제거 시에도 콘텐츠는 즉시 완전 가시(both이 남긴 opacity:0 방지) */
  .feed>*,.feat{opacity:1!important;transform:none!important;}
}
/* ---------- 트렌드/뉴스 ---------- */
.news{display:flex;flex-direction:column;gap:14px;}
.masthead{border-radius:var(--radius-xl);padding:24px 26px;color:#fff;background:#11141c;border:1px solid #1c2030;}
.masthead .mk{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.18em;color:#9aa3f0;}
.masthead .mk .ic{width:14px;height:14px;}
.masthead .mt{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:8px 0 8px;}
.masthead .ms{font-size:13px;line-height:1.7;color:rgba(255,255,255,.72);}
.masthead.nl{background:#1a1206;border-color:#2b1d09;}
.masthead.nl .mk{color:#fbbf6b;}
.tcards{display:flex;flex-direction:column;gap:12px;}
/* ★ tcard side-stripe 제거 — 작성자색은 .tbadge(필) + hover 풀틴트 보더로 */
.tcard{position:relative;display:block;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius-lg);padding:18px 20px 16px;box-shadow:var(--sh-sm);transition:transform .18s var(--ease),box-shadow .18s,border-color .18s;overflow:hidden;}
.tcard:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:color-mix(in srgb,var(--ac,var(--brand)) 32%,var(--line));}
.tcard-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px;}
.tbadge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--ac-fg);background:var(--ac-fill,var(--brand));border-radius:var(--radius-sm);padding:4px 10px;}
.tbadge .dot{width:7px;height:7px;border-radius:50%;background:var(--ac-fg);}
.tdate{font-size:12.5px;font-weight:700;color:var(--muted);font-feature-settings:"tnum";}
.tcard-h{font-size:17px;line-height:1.4;font-weight:700;letter-spacing:-.01em;margin:0 0 6px;color:var(--ink);}
.tcard:hover .tcard-h{color:var(--ac-ink,var(--brand));}
.tcard-l{margin:0 0 10px;font-size:13.5px;line-height:1.6;color:var(--sub);}
.tchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tchip{font-size:11.5px;font-weight:600;color:var(--sub);background:var(--surface-2);border-radius:var(--radius-sm);padding:4px 9px;}
.tmore{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:700;color:var(--brand-ink);}
.tmore .ic{width:14px;height:14px;}/* 일자 페이저 */
.dpager{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:8px 10px;box-shadow:var(--sh-sm);}
.dpbtn{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--ac-fg);background:var(--ac-fill,var(--brand));border:0;border-radius:var(--radius-sm);padding:8px 12px;cursor:pointer;font-family:inherit;flex:none;}
.dpbtn .ic{width:15px;height:15px;}
.dpbtn:disabled{background:var(--line);color:var(--muted);cursor:default;}
.dpsel{flex:1;min-width:0;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink);background:var(--bg-subtle);border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;cursor:pointer;}
.dpos{font-size:12px;font-weight:700;color:var(--muted);flex:none;font-feature-settings:"tnum";}

.site-foot{max-width:var(--maxw);margin:0 auto;padding:24px 20px 44px;border-top:1px solid var(--line);
  color:var(--muted);font-size:12px;line-height:1.7;text-align:center;}
.site-foot b{color:var(--sub);}

@media(max-width:560px){

/* ============================================================
   디자인 포인트 보강 (원톤 탈피) + 캘린더 + 국가 선택
   ============================================================ */
:root{
  --hero-tint:#EEF2FF; --hero-dot:rgba(76,111,255,.07);
  --body-dot:rgba(20,24,46,.020); --ring:var(--sh-ring);
  --grad-line:linear-gradient(90deg,transparent,var(--brand) 50%,transparent);
  --a-cal:#0891B2; --a-cal-weak:#E0F4F8;
}
:root[data-theme="dark"]{
  --hero-tint:#141A30; --hero-dot:rgba(143,160,255,.10);
  --body-dot:rgba(255,255,255,.014); --a-cal:#38BDF8; --a-cal-weak:#0E2230;
}
/* body 표면 텍스처(아주 옅은 도트) */
body{background-image:radial-gradient(var(--body-dot) 1px,transparent 1px);background-size:22px 22px;}
@media(max-width:560px){ body{background-image:none;} }
/* 상단 히어로 밴드 — 전체 글 뷰에서만(.main.hero) */
.main.hero .viewhead{position:relative;margin:-8px -20px 6px;padding:30px 22px 22px;border-radius:var(--radius-xl);
  background:radial-gradient(var(--hero-dot) 1.3px,transparent 1.3px) 0 0/20px 20px,linear-gradient(180deg,var(--hero-tint),transparent 80%);overflow:hidden;}
.main.hero .viewhead::before{content:"";position:absolute;left:18px;right:18px;top:0;height:2px;border-radius:2px;background:var(--grad-line);opacity:.5;}
@media(max-width:560px){ .main.hero .viewhead{margin:-6px -14px 6px;padding:24px 16px 18px;} }
/* 통계 숫자 강조 + hover */
.stat .n{color:var(--brand-ink);} .stat:last-child .n{color:var(--ink);}
.stat{transition:background-color .14s var(--ease);} .stat:hover{background:var(--surface);}
/* 툴바 위 그라데이션 디바이더 */
.toolbar{position:relative;}
.toolbar::before{content:"";position:absolute;left:0;right:0;top:-11px;height:1px;background:linear-gradient(90deg,transparent,var(--line-strong) 18%,var(--line-strong) 82%,transparent);}
/* ★ side-stripe 대체: hover 시 작성자색 풀틴트 면(color-mix bg) + 보더 틴트 + 제목 작성자색 */
.card::after,.feat::after{content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;opacity:0;
  background:linear-gradient(180deg,color-mix(in srgb,var(--ac,var(--brand)) 7%,transparent),color-mix(in srgb,var(--ac,var(--brand)) 3%,transparent));
  transition:opacity .18s var(--ease);}
.card:hover::after,.feat:hover::after{opacity:1;}
.card:hover,.feat:hover{border-color:color-mix(in srgb,var(--ac,var(--brand)) 35%,var(--line));}
.card:hover .c-title,.feat:hover .f-title{color:var(--ac-ink,var(--brand));}
.card>*,.feat>*{position:relative;z-index:1;}
/* 카테고리 칩에 작성자색 한 방울 */
/* 카테고리 칩에 작성자색 한 방울 — 방향성 스트라이프 대신 1px 풀보더 틴트(left-only 제거) */
.card .chip,.feat .chip{border:1px solid color-mix(in srgb,var(--ac,var(--brand)) 22%,var(--line));background:color-mix(in srgb,var(--ac,var(--brand)) 6%,var(--surface-2));}
/* featured 키커: 작성자색 pill */
.feat .f-k{background:color-mix(in srgb,var(--ac,var(--brand)) 12%,transparent);color:var(--ac-ink,var(--brand));padding:4px 10px;border-radius:9999px;width:max-content;}
/* focus-visible 링 통일 */
.card:focus-visible,.feat:focus-visible,.tcard:focus-visible,.cal-card a:focus-visible,
.pager button:focus-visible,.sbtn:focus-visible,.icon-btn:focus-visible,.topnav button:focus-visible,
.nlink:focus-visible,.dpbtn:focus-visible,.dpsel:focus-visible,.cseg button:focus-visible{outline:none;box-shadow:var(--sh-ring);border-color:var(--brand);}
/* 마스트헤드 상단 글로우(브랜드 온도) */
.masthead{position:relative;overflow:hidden;}
.masthead::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,148,255,.55) 50%,transparent);}
.masthead.nl::before{background:linear-gradient(90deg,transparent,rgba(251,191,107,.55) 50%,transparent);}
/* ---------- 새 글 요청 폼 ---------- */
.req-nav{--ac:var(--brand);}
.reqwrap{max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:18px;}
.reqcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px;}
.reqcard-h{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.reqcard-h .ic{width:26px;height:26px;color:var(--brand);flex:none;}
.rc-t{font-size:18px;font-weight:800;}
.rc-s{font-size:12.5px;color:var(--muted);margin-top:2px;}
.rf-l{display:block;font-size:13px;font-weight:700;margin:14px 0 6px;}
.rf-req{color:var(--danger);} .rf-opt{color:var(--muted);font-weight:500;font-size:11.5px;}
.rf-i{width:100%;box-sizing:border-box;font-family:inherit;font-size:14px;color:var(--ink);background:var(--bg-subtle);
  border:1px solid var(--line-strong);border-radius:var(--radius-sm);padding:11px 13px;transition:.12s;}
.rf-i:focus{outline:none;border-color:var(--brand);background:var(--surface);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 14%,transparent);}
.rf-ta{min-height:84px;resize:vertical;line-height:1.55;}
.rf-file{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.rf-fbtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;cursor:pointer;
  background:var(--bg-subtle);border:1px solid var(--line-strong);border-radius:var(--radius-sm);padding:9px 14px;color:var(--sub);}
.rf-fbtn:hover{border-color:var(--brand);color:var(--brand);} .rf-fbtn .ic{width:15px;height:15px;}
.rf-fname{font-size:12.5px;color:var(--muted);}
.rf-fclear{font-size:12px;font-weight:700;color:var(--danger);background:none;border:none;cursor:pointer;padding:4px;}
.rf-hint{display:flex;gap:7px;align-items:flex-start;font-size:12px;color:var(--sub);line-height:1.6;
  background:color-mix(in srgb,var(--brand) 6%,transparent);border:1px solid color-mix(in srgb,var(--brand) 18%,transparent);
  border-radius:var(--radius-sm);padding:10px 12px;margin-top:12px;}
.rf-hint .ic{width:15px;height:15px;flex:none;margin-top:1px;color:var(--brand);}
.rf-hint.on{background:color-mix(in srgb,var(--brand) 11%,transparent);border-color:color-mix(in srgb,var(--brand) 30%,transparent);color:var(--ink);font-weight:600;}
.rf-sec{font-size:11.5px;font-weight:800;color:var(--muted);letter-spacing:.03em;margin:20px 0 2px;padding-top:15px;border-top:1px solid var(--line);}
.rf-sec:first-of-type{border-top:none;padding-top:2px;margin-top:6px;}
.rf-chips{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 0;}
.rf-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-strong);background:var(--surface);color:var(--sub);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;padding:7px 13px;border-radius:999px;transition:.12s;}
.rf-chip .rf-chip-dot{width:8px;height:8px;border-radius:50%;background:var(--ac,var(--muted));flex:none;}
.rf-chip .rf-chip-plat{font-size:10.5px;font-weight:700;color:var(--muted);}
.rf-chip:hover{border-color:var(--ac,var(--brand));color:var(--ink);}
.rf-wchip.on{background:var(--ac-fill,var(--brand));color:var(--ac-fg);border-color:transparent;}
.rf-wchip.on .rf-chip-dot{background:var(--ac-fg);}
.rf-wchip.on .rf-chip-plat{color:var(--ac-fg);opacity:.82;}
.rf-winfo{font-size:12px;color:var(--muted);margin-top:8px;min-height:15px;}
.rf-hint-list{align-items:flex-start;}
.rf-hl{margin:0;padding:0 0 0 18px;display:flex;flex-direction:column;gap:5px;list-style:decimal;}
.rf-hl li{padding-left:2px;line-height:1.55;}
.rf-hl li::marker{color:var(--brand);font-weight:800;}
.rf-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
.rf-submit{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;
  color:var(--on-brand);background:var(--brand-solid);border:none;border-radius:var(--radius-sm);padding:12px 20px;transition:.12s;}
.rf-submit:hover{background:var(--brand-h);} .rf-submit:disabled{opacity:.55;cursor:default;} .rf-submit .ic{width:16px;height:16px;}
.rf-push{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
  color:var(--sub);background:var(--surface);border:1px solid var(--line-strong);border-radius:var(--radius-sm);padding:12px 16px;}
.rf-push:hover{border-color:var(--brand);color:var(--brand);} .rf-push .ic{width:15px;height:15px;}
.rf-msg{margin-top:14px;font-size:13px;font-weight:600;border-radius:var(--radius-sm);padding:10px 13px;}
.rf-msg.ok{color:#0a7d3b;background:color-mix(in srgb,#12b34a 12%,transparent);border:1px solid color-mix(in srgb,#12b34a 30%,transparent);}
.rf-msg.err{color:var(--danger);background:color-mix(in srgb,var(--danger) 10%,transparent);border:1px solid color-mix(in srgb,var(--danger) 28%,transparent);}
.reqlist{display:flex;flex-direction:column;gap:10px;}
.rl-h{font-size:14px;font-weight:800;margin-bottom:2px;}
.rl-item{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 15px;}
.rl-top{display:flex;align-items:center;gap:10px;justify-content:space-between;}
.rl-top b{font-size:14px;}
.rl-st{font-size:11px;font-weight:800;border-radius:999px;padding:2px 9px;background:var(--surface-2);color:var(--sub);border:1px solid var(--line);white-space:nowrap;}
.rl-st.s-submitted,.rl-st.s-received{color:var(--brand-ink);background:color-mix(in srgb,var(--brand) 12%,transparent);border-color:color-mix(in srgb,var(--brand) 30%,transparent);}
.rl-st.s-processing{color:#b26a00;background:color-mix(in srgb,#f59e0b 14%,transparent);border-color:color-mix(in srgb,#f59e0b 32%,transparent);}
.rl-st.s-published{color:#0a7d3b;background:color-mix(in srgb,#12b34a 12%,transparent);border-color:color-mix(in srgb,#12b34a 30%,transparent);}
.rl-st.s-failed{color:var(--danger);background:color-mix(in srgb,var(--danger) 10%,transparent);border-color:color-mix(in srgb,var(--danger) 28%,transparent);}
.rl-sub{font-size:12.5px;color:var(--sub);margin-top:6px;display:flex;align-items:center;gap:5px;}
.rl-sub .ic{width:13px;height:13px;}
.rl-meta{font-size:12px;color:var(--muted);margin-top:7px;}
.rl-meta a{color:var(--brand-ink);font-weight:700;}
.rl-del{position:absolute;right:12px;bottom:12px;font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;cursor:pointer;}
.rl-del:hover{color:var(--danger);}

/* ===== 작업 큐 탭 ===== */
/* 점검 중 배너 — 스킬 점검으로 발행 일시 중단 시 작업 큐 상단에 노출 */
/* ★ 점검 배너 border-left 4px 제거 — 1px 풀보더(warn 틴트) + 경고 아이콘으로 */
.q-maint{display:flex;gap:11px;align-items:flex-start;margin-bottom:14px;padding:13px 15px;
  border:1px solid color-mix(in srgb,var(--warn) 45%,var(--line));border-radius:var(--radius);
  background:var(--warn-weak);box-shadow:var(--sh-sm);}
.q-maint .ic{width:18px;height:18px;color:var(--warn);flex:0 0 auto;margin-top:1px;}
.q-maint-tx{display:flex;flex-direction:column;gap:3px;}
.q-maint-tx b{font-size:14px;font-weight:800;color:var(--ink);}
.q-maint-tx span{font-size:12.5px;line-height:1.5;color:var(--sub);}
.q-loading{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13.5px;padding:30px 6px;justify-content:center;}
.q-loading .ic{width:16px;height:16px;}
.qstats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.qstat{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 10px 13px;text-align:center;
  display:flex;flex-direction:column;gap:3px;box-shadow:var(--sh-sm);overflow:hidden;}
.qstat::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--qc,var(--muted));}
.qstat b{font-size:26px;font-weight:800;line-height:1;font-feature-settings:"tnum";color:var(--qc,var(--ink));}
.qstat span{font-size:12px;font-weight:700;color:var(--muted);}
.qstat.s-received{--qc:var(--brand);} .qstat.s-processing{--qc:#d98a00;} .qstat.s-failed{--qc:var(--danger);}
.q-actions{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.q-refresh{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:800;cursor:pointer;
  border:1px solid var(--line);background:var(--surface);color:var(--sub);border-radius:9px;padding:7px 12px;transition:.12s;}
.q-refresh:hover{color:var(--ink);border-color:var(--line-strong);} .q-refresh .ic{width:14px;height:14px;}
.q-refresh:disabled{opacity:.6;cursor:default;}
.q-hint{font-size:11.5px;color:var(--muted);}
/* 영역 구분: 두 섹션을 카드로 감싸고 헤더에 색 띠 */
.q-sec{border:1px solid var(--line);border-radius:var(--radius-lg);padding:6px 14px 14px;margin-bottom:18px;background:var(--bg-subtle);}
.q-sec.q-active{background:color-mix(in srgb,var(--brand) 5%,var(--surface));border-color:color-mix(in srgb,var(--brand) 22%,var(--line));}
.q-sec.q-history{background:var(--bg-subtle);}
.q-sec-h{font-size:13.5px;font-weight:800;color:var(--ink);margin:0 0 4px;padding:12px 2px 11px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--line);}
.q-sec.q-active .q-sec-h{border-bottom-color:color-mix(in srgb,var(--brand) 22%,var(--line));}
.q-sec-h .ic{width:16px;height:16px;flex:none;}
.q-active .q-sec-h .ic{color:var(--brand-ink);} .q-history .q-sec-h .ic{color:var(--danger);}
.q-sec-h>span:first-of-type{flex:1;}
.q-sec-n{font-size:12px;font-weight:800;color:#fff;background:var(--muted);border-radius:999px;padding:1px 9px;min-width:22px;text-align:center;}
.q-active .q-sec-n{background:color-mix(in srgb,var(--brand) 80%,var(--ac-mixfloor,#15171C));} .q-history .q-sec-n{background:var(--danger);}
:root[data-theme="dark"] .q-active .q-sec-n{background:var(--brand);color:var(--bg);}
.q-list{display:flex;flex-direction:column;gap:10px;padding-top:12px;}
.q-empty{font-size:13px;color:var(--muted);padding:20px;text-align:center;}
/* ★ 아이템 좌측 4px 스트라이프 제거 — 작성자 구분은 선두 닷(.q-who::before)+아바타로 */
.q-item{position:relative;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:13px 15px;box-shadow:var(--sh-sm);
  transition:border-color .18s var(--ease);}
.q-item:hover{border-color:color-mix(in srgb,var(--wac,var(--line-strong)) 34%,var(--line));}
.q-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px;}
.q-who{display:inline-flex;align-items:center;gap:7px;min-width:0;}
.q-who::before{content:"";width:8px;height:8px;border-radius:50%;flex:none;background:var(--wac,var(--line-strong));}
.q-who .av{width:24px;height:24px;flex:none;}
.q-who .ic{width:18px;height:18px;color:var(--muted);flex:none;}
.q-wname{font-size:13px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-title{font-size:14.5px;font-weight:700;line-height:1.45;color:var(--ink);}
.q-sub{font-size:12.5px;color:var(--sub);margin-top:6px;line-height:1.5;}
.q-reason{display:flex;align-items:flex-start;gap:6px;margin-top:9px;font-size:12.5px;line-height:1.5;
  color:var(--danger);background:color-mix(in srgb,var(--danger) 9%,transparent);border:1px solid color-mix(in srgb,var(--danger) 24%,transparent);
  border-radius:8px;padding:8px 10px;}
.q-reason .ic{width:14px;height:14px;flex:none;margin-top:1px;} .q-reason b{font-weight:800;}
.q-reason.cancel{color:var(--sub);background:var(--surface-2);border-color:var(--line);}
.q-meta{font-size:12px;color:var(--muted);margin-top:9px;}
.q-cancel{position:absolute;right:13px;bottom:12px;display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:800;
  color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer;transition:.12s;}
.q-cancel:hover{color:var(--danger);border-color:color-mix(in srgb,var(--danger) 45%,transparent);background:color-mix(in srgb,var(--danger) 6%,var(--surface));}
.q-cancel .ic{width:13px;height:13px;}
/* 상태 배지: 큐 전용 색(처리중·취소 보강) */
.rl-st.s-cancel{color:var(--sub);background:var(--surface-2);border-color:var(--line-strong);}
@media(max-width:520px){ .q-item{padding-bottom:42px;} .q-cancel{right:12px;bottom:11px;} }
/* ============================================================
   2차 개편 — 작성자 아바타 · 일러스트 · 브랜드 히어로
   ============================================================ */
/* ---------- 아바타 칩 ---------- */
.av{display:inline-block;width:30px;height:30px;flex:none;border-radius:50%;overflow:hidden;
  background:color-mix(in srgb,var(--ac,var(--brand)) 16%,var(--surface));
  box-shadow:0 0 0 2px var(--surface),0 0 0 3.4px color-mix(in srgb,var(--ac,var(--brand)) 45%,transparent);
  position:relative;vertical-align:middle;}
.av img{width:100%;height:100%;object-fit:cover;display:block;}
.av-fb{display:grid;place-items:center;font-weight:800;font-size:.8em;color:#fff;
  background:var(--ac,var(--brand));box-shadow:0 0 0 2px var(--surface);}
.av.s{width:24px;height:24px;box-shadow:0 0 0 1.5px var(--surface),0 0 0 2.6px color-mix(in srgb,var(--ac,var(--brand)) 45%,transparent);}
.av.l{width:48px;height:48px;}
.av.xl{width:76px;height:76px;box-shadow:0 0 0 3px var(--surface),0 0 0 5px color-mix(in srgb,var(--ac,var(--brand)) 50%,transparent);}
/* 카드 작성자 줄 — dot → 아바타 */
.who.has-av{gap:8px;padding:2px 9px 2px 2px;background:color-mix(in srgb,var(--ac,var(--brand)) 7%,var(--surface));
  border:1px solid color-mix(in srgb,var(--ac,var(--brand)) 22%,transparent);border-radius:999px;}
.who.has-av .dot{display:none;}
.feat .who.has-av .av{width:34px;height:34px;}

/* ---------- 일러스트 빈 상태 ---------- */
.empty{display:flex;flex-direction:column;align-items:center;gap:4px;}
.empty-il{width:150px;height:150px;object-fit:contain;margin-bottom:2px;filter:drop-shadow(0 8px 18px rgba(40,32,90,.10));}
.empty-msg{font-size:14px;color:var(--muted);line-height:1.6;}
@media(max-width:560px){ .empty-il{width:124px;height:124px;} }

/* ---------- 브랜드 히어로(전체 글) ---------- */
.main.has-hero .viewhead{display:none;}   /* 히어로(홈·작성자)면 셸 제목줄 숨김 */
.hero2{position:relative;overflow:hidden;border-radius:var(--radius-xl);margin:-8px 0 18px;padding:26px 26px 24px;

.hero2::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--grad-line);opacity:.6;}

  border-radius:999px;padding:4px 11px;}
.hero2-eyebrow .ic{width:13px;height:13px;}
.hero2-title{font-size:clamp(24px,5.6vw,32px);font-weight:800;letter-spacing:-.025em;line-height:1.18;margin:12px 0 0;}
.hero2-sub{margin:8px 0 0;font-size:13.5px;line-height:1.6;color:var(--sub);max-width:46ch;}

.hpill{display:inline-flex;align-items:baseline;gap:6px;background:var(--surface);border:1px solid var(--line);
  border-radius:999px;padding:6px 13px;box-shadow:var(--sh-sm);}
.hpill .n{font-size:16px;font-weight:800;color:var(--brand-ink);letter-spacing:-.02em;font-feature-settings:"tnum";}
.hpill:last-child .n{color:var(--ink);}
.hpill .l{font-size:11.5px;font-weight:600;color:var(--muted);}
.hero2-art{flex:none;position:relative;width:208px;height:150px;display:flex;align-items:flex-end;justify-content:center;}
.hero2-mascot{position:absolute;right:2px;bottom:-2px;width:128px;height:128px;object-fit:contain;
  filter:drop-shadow(0 10px 22px rgba(40,32,90,.18));z-index:1;}
.hero2-team{position:absolute;left:0;bottom:18px;display:flex;z-index:2;}
.hero2-team .av{width:46px;height:46px;margin-right:-14px;box-shadow:0 0 0 3px var(--surface),0 0 0 4.6px color-mix(in srgb,var(--ac,var(--brand)) 48%,transparent);
  transition:transform .16s var(--ease);}
.hero2-team .av:hover{transform:translateY(-4px);z-index:3;}
.hero2-team .av-more{display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--sub);
  background:var(--surface-2);box-shadow:0 0 0 3px var(--surface);}
@media(max-width:680px){
  .hero2{flex-direction:column;align-items:flex-start;gap:8px;padding:22px 18px 18px;}
  .hero2-art{width:100%;height:118px;align-self:stretch;}
  .hero2-mascot{width:108px;height:108px;right:8px;}
  .hero2-team{left:2px;bottom:10px;}
  .hero2-team .av{width:42px;height:42px;}
}

/* ---------- 작성자 히어로(작성팀 필터 시) ---------- */
.whero{position:relative;overflow:hidden;display:flex;align-items:center;gap:16px;margin:-8px 0 18px;
  padding:20px 22px;border-radius:var(--radius-xl);border:1px solid color-mix(in srgb,var(--ac,var(--brand)) 26%,var(--line));
  background:linear-gradient(120deg,color-mix(in srgb,var(--ac,var(--brand)) 14%,var(--surface)),var(--surface) 72%);
  box-shadow:var(--sh-md);}
/* ★ whero 4px 좌측 스트라이프 제거 — 작성자색은 풀틴트 bg+보더, 플랫폼 필(AA), 아바타로 */

/* ---------- 팀 드롭다운 · 요청 칩 · 트렌드 · 조직도 아바타 ---------- */
.teammenu button .av{margin-right:1px;}
.rf-wchip .av{margin:-2px 2px -2px -6px;}

.tbadge .av{width:22px;height:22px;margin:-3px 2px -3px -4px;box-shadow:0 0 0 1.5px rgba(255,255,255,.9);}
.org-mem-av{float:left;margin:1px 11px 4px 0;}
.org-writer .org-mem-t{min-height:30px;}

/* ---------- 소개 제품 히어로에 마스코트 ---------- */

.prod-hero-tx{flex:1;min-width:0;}

 /* ---------- 발행 요청 백엔드 연동 (app/api.js BC_CONFIG 와 동일 계약) ----------
    ⚠ API 주소·VAPID 키가 바뀌면 app/api.js 와 이 두 값을 함께 갱신할 것(단일 출처 권장하나 현재는 양쪽 하드코딩). */
 const REQ_CFG={
   API_BASE:'https://34.139.184.70.sslip.io',  // POST/GET {base}/requests
   VAPID:'BFrapX1Q23mY2kAu_qnq8izG-lYCzsKvqF92QRscaK9b3ZBhvsGn-n0CQ7HkOlPYBNrdZqL6OsZFUpbrZ2ZsEN8',
   ACCEPT:'.docx,.xlsx,.pdf,.txt,.hwpx,application/pdf,text/plain' // 첨부 허용(요청 #4)
 };
 const apiBase=()=>(REQ_CFG.API_BASE||"").replace(/\/$/,"");
 const REQ_LS="bc_site_requests_v1";
 const reqLoad=()=>{ try{return JSON.parse(localStorage.getItem(REQ_LS)||"[]");}catch(e){return [];} };
 const reqSave=a=>{ try{localStorage.setItem(REQ_LS,JSON.stringify(a));}catch(e){} };
 const RequestService={
   isConnected(){ return !!REQ_CFG.API_BASE; },
   list(){ return reqLoad().sort((a,b)=>b.createdAt-a.createdAt); },
   /* req: {purpose, topic, material, writer, file?:File}. 첨부 있으면 multipart, 없으면 JSON. */
   async submit(req){
     const rec=Object.assign({id:"req_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),createdAt:Date.now(),status:"local",
       fileName:(req.file&&req.file.name)||null},
       {purpose:req.purpose,topic:req.topic,material:req.material,writer:req.writer});
     if(this.isConnected()){
       try{
         let res;
         if(req.file){
           const fd=new FormData();
           fd.append("topic",req.topic||""); fd.append("material",req.material||"");
           if(req.writer)fd.append("writer",req.writer);
           if(req.purpose)fd.append("purpose",req.purpose);
           fd.append("source","site");
           fd.append("attachment",req.file,req.file.name);
           res=await fetch(apiBase()+"/requests",{method:"POST",body:fd});
         }else{
           res=await fetch(apiBase()+"/requests",{method:"POST",headers:{"Content-Type":"application/json"},
             body:JSON.stringify({purpose:req.purpose,topic:req.topic,material:req.material,writer:req.writer,source:"site"})});
         }
         if(!res.ok)throw new Error("HTTP "+res.status);
         const body=await res.json().catch(()=>({}));
         rec.status="submitted"; rec.serverId=body.id||null;
       }catch(err){ rec.status=req.file?"failed":"queued"; rec.error=String((err&&err.message)||err); }
     }
     const all=reqLoad(); all.push(rec); reqSave(all); return rec;
   },
   remove(id){ reqSave(reqLoad().filter(r=>r.id!==id)); },
   /* 백엔드 GET /requests 로 내 요청들의 실제 상태를 동기화한다.
      - serverId(접수 응답의 id)로 매칭해 status/제목/발행링크를 갱신.
      - 발행 완료(published)된 요청은 목록에서 제거(요청 #1) — '아직 발행 안 된 것'만 남긴다.
      반환: 변경이 있었으면 true. 네트워크 실패엔 조용히 false(기존 표시 유지). */
   async syncStatuses(){
     if(!this.isConnected())return false;
     let remote;
     try{ const res=await fetch(apiBase()+"/requests"); if(!res.ok)return false; remote=await res.json(); }
     catch(_){ return false; }
     if(!Array.isArray(remote))return false;
     const byId={}; remote.forEach(x=>{ if(x&&x.id)byId[x.id]=x; });
     const all=reqLoad(); let changed=false; const kept=[];
     for(const r of all){
       const rm=r.serverId&&byId[r.serverId];
       if(rm){
         if(r.status!==rm.status){ r.status=rm.status; changed=true; }
         if(rm.publishUrl&&r.publishUrl!==rm.publishUrl){ r.publishUrl=rm.publishUrl; changed=true; }
         if(rm.title&&r.title!==rm.title){ r.title=rm.title; changed=true; }
         if(rm.status==="published"){ changed=true; continue; }  /* 발행 완료 → 내 요청 목록에서 제거 */
       }
       kept.push(r);
     }
     if(changed)reqSave(kept);
     return changed;
   }
 };
 /* ---------- 숨김(hide) — 글 rel 단위 소프트 숨김. admin 토큰 없이 누구나 즉시 숨김/해제 ----------
    공유 저장은 백엔드(VM)에 둔다(깃 토큰 없는 사람도 모두에게 숨길 수 있게). 글 파일·발행은 건드리지 않고
    목록에서만 가린다(가역). 백엔드 미연결/실패 시엔 아무것도 안 숨김(가시성 우선 fail-open). */
 const HIDDEN=new Set();   // 현재 숨김된 rel (런타임 캐시 — 백엔드 GET /hidden 으로 채움)
 const HiddenSvc={
   isConnected(){ return !!REQ_CFG.API_BASE; },
   async load(){
     if(!this.isConnected())return;
     try{ const r=await fetch(apiBase()+"/hidden?ts="+Date.now()); if(!r.ok)return;
          const d=await r.json(); HIDDEN.clear(); ((d&&d.rels)||[]).forEach(x=>HIDDEN.add(String(x))); }catch(_){ }
   },
   async hide(rel){
     if(!this.isConnected())throw new Error("백엔드 미연결 — 숨김은 서버 연결이 필요해요.");
     const r=await fetch(apiBase()+"/hidden",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({rel,source:"site"})});
     if(!r.ok){ let m=""; try{ m=(await r.json()).error; }catch(_){ } throw new Error(m||("HTTP "+r.status)); }
     HIDDEN.add(rel);
   },
   async unhide(rel){
     if(!this.isConnected())throw new Error("백엔드 미연결 — 숨김 해제는 서버 연결이 필요해요.");
     const r=await fetch(apiBase()+"/hidden/unhide",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({rel})});
     if(!r.ok){ let m=""; try{ m=(await r.json()).error; }catch(_){ } throw new Error(m||("HTTP "+r.status)); }
     HIDDEN.delete(rel);
   }
 };

 /* ---------- 수동 발행완료(manual published) — 숨김과 동일 구조. admin 토큰 없이 누구나 표시/취소 ----------
    자동검증 발행(깃 published.json)과 별개의 소프트 '발행됨' 플래그(백엔드 저장). 사이트가 union 해서 표시한다.
    백엔드 미연결/실패 시엔 수동 표시분은 안 보임(자동검증 발행글은 깃에 남아 그대로). */
 const MPUB=new Set();   // 현재 수동 발행완료된 rel (백엔드 GET /mpub 으로 채움)
 const MpubSvc={

          const d=await r.json(); MPUB.clear(); ((d&&d.rels)||[]).forEach(x=>MPUB.add(String(x))); }catch(_){ }

     if(!r.ok){ let m=""; try{ m=(await r.json()).error; }catch(_){ } throw new Error(m||("HTTP "+r.status)); }
     MPUB.add(rel);
   },
   async unmark(rel){
     if(!this.isConnected())throw new Error("백엔드 미연결 — 발행완료 취소는 서버 연결이 필요해요.");

     if(!r.ok){ let m=""; try{ m=(await r.json()).error; }catch(_){ } throw new Error(m||("HTTP "+r.status)); }
     MPUB.delete(rel);

     +`<button role="menuitem" data-k="__archive__" style="--ac:var(--brand)">${svg("archive")}아카이브<span class="cnt">${archCnt}</span></button>`;

   const isWriter=k=>writers.indexOf(k)>=0;

     navEl.querySelectorAll("button").forEach(x=>x.classList.remove("on"));

     if(v==="__all__"||v==="__trend__"||v==="__queue__"){ const nb=navEl.querySelector(sel(v)); if(nb)nb.classList.add("on"); }
   }
   window.__syncNav=setActive;   // 홈 로고 등 외부에서 활성 동기화
   setActive();

   /* 드롭다운 컨트롤러(작성팀·트렌드 공용, 상호 배타) */
   const drops=[];
   function mkDrop(anchor,menu,expBtn){
     const d={menu,expBtn};
     d.position=function(){ const r=anchor.getBoundingClientRect(); menu.style.top=(r.bottom+6)+"px";
       const mw=menu.offsetWidth||190; let left=r.left; if(left+mw>window.innerWidth-8)left=window.innerWidth-mw-8; if(left<8)left=8; menu.style.left=left+"px"; };
     d.close=function(){ if(menu.hidden)return; menu.hidden=true; if(expBtn)expBtn.setAttribute("aria-expanded","false"); };

     d.toggle=function(){ menu.hidden?d.open():d.close(); };
     drops.push(d); return d;

 function postCard(p,feat){
   const ac=ACCENT[p.author]||FALLBACK_AC;
   const title=p.title||p.topic||p.file;
   const dd=p.ts?fmtDay(p.created):"—";
   const isNew=p.ts && !p.published && (Date.now()-p.ts)<NEW_MS; /* 발행된 글엔 NEW 안 붙임 */
   const edited=p.uts && fmtDay(p.updated)!==fmtDay(p.created);
   const isHidden=HIDDEN.has(p.rel);
   const who=`<span class="who has-av" style="--ac:${ac}">${avatar(p.author,"s")}${esc(p.author)}</span>`;
   const newBadge=isNew?`<span class="badge-new">NEW</span>`:"";
   const pubBadge=p.published?`<span class="badge-pub">${svg("check")}발행됨</span>`:"";
   const hidBadge=isHidden?`<span class="badge-hid">${svg("eyeOff")}숨김</span>`:"";
   /* 우측 슬롯 1자리: 발행됨 우선, 없으면 NEW(피처 카드는 NEW 생략) — 가운데 뜨던 발행됨을 NEW 자리로 정렬 */
   const rightBadge=pubBadge||(feat?"":newBadge);
   const top=`<div class="c-top">${who}${hidBadge}`+(p.cat?`<span class="chip">${esc(p.cat)}</span>`:"")+rightBadge+`</div>`;
   const meta=`<div class="c-meta"><span class="m">${svg("calendar")}${esc(dd)} 등록</span>`+
     (edited?`<span class="m edited">수정 ${esc(fmtDay(p.updated))}</span>`:"")+
     (p.readmin?`<span class="m">${svg("clock")}${p.readmin}분</span>`:"")+`</div>`;
   const pubCls=(p.published?" pub":"")+(isHidden?" hidden-on":"");
   if(feat){
     return `<a class="feat${pubCls}" href="${enc(p.rel)}" style="--ac:${ac}" data-rel="${esc(p.rel)}" data-pub="${p.published?1:0}" data-autopub="${p.autopub?1:0}">`+
       `<div class="f-k">${svg("spark")} 최신 글</div>${top}`+
       `<h2 class="f-title">${esc(title)}</h2>`+
       (p.excerpt?`<p class="c-ex f-ex">${esc(p.excerpt)}</p>`:"")+meta+`</a>`;
   }
   return `<a class="card${pubCls}" href="${enc(p.rel)}" style="--ac:${ac}" data-rel="${esc(p.rel)}" data-pub="${p.published?1:0}" data-autopub="${p.autopub?1:0}">${top}`+
     `<h3 class="c-title">${esc(title)}</h3>`+
     (p.excerpt?`<p class="c-ex">${esc(p.excerpt)}</p>`:"")+meta+`</a>`;
 }

   { const _fab=document.getElementById("fabReq"); if(_fab)_fab.style.display=(state.view==="__request__")?"none":""; }  /* 요청 폼에선 FAB 숨김 */
   const isArchiveView=state.view==="__archive__";
   if(state.view==="__queue__"){ searchBox.style.display="none"; renderQueue(); return; }
   if(state.view==="__request__"){ searchBox.style.display="none"; renderRequest(); return; }
   if(state.view==="__trend__"){ searchBox.style.display=""; renderTrend(); return; }
   searchBox.style.display=""; if(qEl)qEl.placeholder=isArchiveView?"아카이브 검색":"제목·내용 검색";
   mainEl.classList.toggle("hero", state.view==="__all__"&&!state.q&&state.page===1);
   let list;
   if(isArchiveView){ list=POSTS.filter(isArchived); }                          /* 아카이브 = 발행·숨김 글만 */
   else { list=state.view==="__all__"?POSTS:POSTS.filter(p=>p.author===state.view); list=list.filter(p=>!isArchived(p)); }  /* 전체·작성자 = 비아카이브만 */
   if(state.q){ list=list.filter(p=>(p.title+" "+p.excerpt+" "+p.cat+" "+p.group+" "+p.topic).toLowerCase().includes(state.q)); }
   /* 아카이브 하위 필터(전체/발행됨/숨김). 숨김 카운트는 '발행 안 됐는데 숨김'만(발행됨 표기 우선). */
   const archPub=isArchiveView?list.filter(p=>p.published).length:0;

   if(isArchiveView){
     if(state.archiveSub==="pub")list=list.filter(p=>p.published);

   }

   const dir=state.sortDir==="asc"?1:-1;
   list=list.slice().sort((x,y)=>(x.ts-y.ts)*dir || x.title.localeCompare(y.title,"ko"));

   const total=list.length;

   subEl.innerHTML=`<b>${sortLabel}</b> · 총 <b>${total}</b>편`+tag+(state.q?` · '${esc(state.q)}' 검색`:"")+(pages>1?` · <b>${state.page}</b>/${pages}페이지`:"");

   const isHome=state.view==="__all__"&&!state.q&&state.page===1;
   const isWriterView=!isArchiveView&&state.view!=="__all__";
   const heroHtml = isHome ? hero2Html() : ((isWriterView&&!state.q) ? wheroHtml(state.view) : "");
   mainEl.classList.toggle("has-hero", !!heroHtml);   /* 히어로 있으면 셸 제목줄 숨김 */
   const desc=state.sortDir!=="asc";
   const useFeat=!isArchiveView&&!state.q&&desc&&state.page===1&&total>1;
   const toolbar=toolbarHtml(total,isArchiveView,archPub,archHid);

   if(!total){
     const emsg=isArchiveView?'아카이브가 비어 있어요.<br>글을 ‘발행 완료’ 또는 ‘숨기기’ 하면 여기로 모여요.'
       :(state.q?`‘${esc(state.q)}’에 맞는 글이 없어요.`:'조건에 맞는 글이 없어요.');
     const ekind=isArchiveView?'archive':(state.q?'search':'base');
     contentEl.innerHTML=heroHtml+toolbar+emptyBox(ekind,emsg); attachTools(); return; }

   const gridCls=state.gridView?" grid":"";
   let body;
   if(useFeat){ const [first,...rest]=pageItems;
     body=postCard(first,true)+(rest.length?`<div class="feed${gridCls}">${rest.map(p=>postCard(p,false)).join("")}</div>`:"");
   } else {
     body=`<div class="feed${gridCls}">${pageItems.map(p=>postCard(p,false)).join("")}</div>`;
   }
   contentEl.innerHTML=heroHtml+toolbar+body+pagerHtml(state.page,pages);
   attachTools();
 }

 function pagerHtml(page,pages){
   if(pages<=1)return"";
   const win=1, slots=[]; let last=0;
   for(let i=1;i<=pages;i++){
     if(i===1||i===pages||(i>=page-win&&i<=page+win)){
       if(last&&i-last>1)slots.push("gap"); slots.push(i); last=i;
     }
   }
   const nums=slots.map(s=> s==="gap" ? `<span class="gap">…</span>`
     : `<button data-page="${s}"${s===page?' class="cur" aria-current="page"':""}>${s}</button>`).join("");
   return `<nav class="pager" aria-label="페이지">`+
     `<button data-page="${page-1}"${page<=1?" disabled":""} aria-label="이전 페이지">${svg("chevL")}이전</button>`+
     nums+
     `<button data-page="${page+1}"${page>=pages?" disabled":""} aria-label="다음 페이지">다음${svg("chevR")}</button>`+
   `</nav>`;
 }

 /* ---------- 작업 큐 · 히스토리 (백엔드 GET /requests 전체 — 누구나 열람) ---------- */
 /* 대기/진행 중인 글, 실패·취소 히스토리(사유 포함), 큐 깊이를 보여주고, 접수 대기 요청은 취소(삭제)한다. */
 let QUEUE_TIMER=null;
 function qTime(ms){ try{ const d=new Date(ms); const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }catch(e){ return ""; } }
 async function queueFetch(){ const r=await fetch(apiBase()+"/requests?ts="+Date.now()); if(!r.ok)throw new Error("HTTP "+r.status); const a=await r.json(); return Array.isArray(a)?a:[]; }
 /* 점검(maintenance) 상태 — 스킬 점검 중이면 발행이 일시 중단됨. 실패 시 null(배너 안 띄움). */
 async function maintenanceFetch(){ try{ const r=await fetch(apiBase()+"/maintenance?ts="+Date.now()); if(!r.ok)return null; return await r.json(); }catch(_){ return null; } }
 async function refreshQueueBadge(){
   const el=document.getElementById("navQueueCnt"); if(!el)return;
   if(!RequestService.isConnected()){ el.hidden=true; return; }
   try{ const all=await queueFetch(); const active=all.filter(x=>x.status==="received"||x.status==="processing").length;
     if(active>0){ el.textContent=active; el.hidden=false; } else { el.hidden=true; } }catch(e){ el.hidden=true; }
 }
 async function cancelQueued(id,topic){
   if(!confirm(`이 요청을 큐에서 취소(삭제)할까요?\n\n「${topic||"(주제 없음)"}」\n\n접수 대기 중인 요청만 취소돼요. 작성이 이미 시작된 요청은 취소되지 않아요.`))return;
   try{
     const r=await fetch(apiBase()+"/requests/"+encodeURIComponent(id)+"/cancel",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({by:"queue-ui"})});
     if(r.status===409){ const b=await r.json().catch(()=>({})); toast(b.error||"이미 처리가 시작돼 취소할 수 없어요.","err"); renderQueue(); return; }
     if(!r.ok)throw new Error("HTTP "+r.status);
     toast("요청을 취소했어요."); renderQueue(); refreshQueueBadge();
   }catch(e){ toast("취소 실패: "+((e&&e.message)||e),"err"); }
 }
 window.__cancelQueued=cancelQueued;
 function renderQueue(){
   titleEl.textContent="작업 큐"; subEl.textContent="대기·진행 중인 글과 실패·취소 기록 — 작성자별로, 큐가 얼마나 쌓였는지 한눈에";
   if(QUEUE_TIMER){ clearInterval(QUEUE_TIMER); QUEUE_TIMER=null; }
   const mast=`<div class="masthead" style="--ac:var(--a-queue)"><div class="mk">${svg("inbox")}WORK QUEUE · 작업 큐</div><div class="mt">발행 요청 대기열 · 실패·취소 기록</div><div class="ms">‘발행 요청’으로 들어온 글들이 작성→검수→발행되는 큐예요. 진행 상황과 실패 사유를 작성자별로 보고, 아직 시작 안 한 요청은 취소(삭제)할 수 있어요. (발행 완료 글은 ‘전체 글’에서 확인.)</div></div>`;
   if(!RequestService.isConnected()){
     contentEl.innerHTML=`<div class="news">${mast}${emptyBox("request","백엔드가 연결돼 있지 않아 큐를 불러올 수 없어요.")}</div>`; return;
   }
   contentEl.innerHTML=`<div class="news">${mast}<div id="qBox"><div class="q-loading">${svg("refresh")} 큐를 불러오는 중…</div></div></div>`;
   const paint=(all,maint)=>{
     const box=document.getElementById("qBox"); if(!box)return;
     const maintBanner=(maint&&maint.active)
       ? `<div class="q-maint" role="status">${svg("alertTri")}<div class="q-maint-tx"><b>점검 중 — 발행 일시 중단</b><span>스킬 점검 중이라 글 발행을 잠시 멈췄어요. 새 글 요청은 정상 접수되며, 점검이 끝나면 대기 순서대로 다시 자동 발행됩니다.</span></div></div>`
       : "";
     const by=s=>all.filter(x=>x.status===s);
     /* 발행됨(published)은 '전체 글'에 나오므로 큐에서 제외(사용자 06-14). */
     const received=by("received"), processing=by("processing"), failed=by("failed"), skipped=by("skipped");
     const active=[...processing,...received].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
     const history=[...failed,...skipped].sort((a,b)=>(b.statusAt||b.createdAt||0)-(a.statusAt||a.createdAt||0));
     const stat=(n,label,cls)=>`<div class="qstat ${cls}"><b>${n}</b><span>${label}</span></div>`;
     const bar=`<div class="qstats">${stat(received.length,"대기","s-received")}${stat(processing.length,"진행 중","s-processing")}${stat(failed.length,"실패","s-failed")}</div>`;
     const isCancel=r=>r.status==="skipped"&&/취소/.test(r.error||"");
     const item=(r)=>{
       const wr=r.writer||""; const wac=ACCENT[wr]||"var(--line-strong)";
       const cancel=isCancel(r);
       const stCls=cancel?"cancel":r.status; const stLab=cancel?"취소됨":(REQ_STATUS_LABEL[r.status]||r.status);
       const reason=(r.status==="failed"||r.status==="skipped")&&r.error
         ? `<div class="q-reason${cancel?" cancel":""}">${svg(cancel?"info":"alertTri")}<span><b>${cancel?"취소":"실패 사유"}</b> ${esc(r.error)}</span></div>` : "";
       const tWhen=r.status==="received"?r.createdAt:(r.statusAt||r.createdAt);
       const meta=[r.purpose?"목적 "+esc(r.purpose):"", r.source?esc(r.source):"", esc(qTime(tWhen))].filter(Boolean).join(" · ");
       return `<div class="q-item s-${esc(stCls)}" style="--wac:${wac}">`+
         `<div class="q-top"><span class="q-who">${wr?avatar(wr,"s"):svg("inbox")}<span class="q-wname">${esc(wr||"작성자 자동배정")}</span></span><span class="rl-st s-${esc(stCls)}">${esc(stLab)}</span></div>`+
         `<div class="q-title">${esc(r.topic||"(주제 없음)")}</div>`+
         (r.material?`<div class="q-sub">${esc((r.material||"").slice(0,140))}${(r.material||"").length>140?"…":""}</div>`:"")+
         reason+
         `<div class="q-meta">${meta}</div>`+
         (r.status==="received"?`<button class="q-cancel" data-id="${esc(r.id)}" data-topic="${esc(r.topic||"")}">${svg("trash")}취소</button>`:"")+
         `</div>`;
     };
     const sec=(title,icon,arr,emptyMsg,cls)=>`<section class="q-sec ${cls}"><h3 class="q-sec-h">${svg(icon)}<span>${esc(title)}</span><span class="q-sec-n">${arr.length}</span></h3>`+
       (arr.length?`<div class="q-list">${arr.map(item).join("")}</div>`:`<div class="q-empty">${esc(emptyMsg)}</div>`)+`</section>`;
     box.innerHTML=maintBanner+bar+
       `<div class="q-actions"><button class="q-refresh" id="qRefresh">${svg("refresh")}새로고침</button><span class="q-hint">20초마다 자동 갱신 · 발행 완료 글은 ‘전체 글’에서 확인</span></div>`+
       sec("작업 대기·진행 중","clock",active,"대기 중인 글이 없어요. 트렌드 브리핑이나 ‘새 글 요청’에서 보내보세요.","q-active")+
       sec("실패·취소 기록","alertTri",history,"실패하거나 취소된 글이 없어요.","q-history");
     box.querySelectorAll(".q-cancel").forEach(b=>b.addEventListener("click",()=>cancelQueued(b.dataset.id,b.dataset.topic)));
     const rf=document.getElementById("qRefresh"); if(rf)rf.addEventListener("click",()=>load(true));
   };
   const load=(manual)=>{ if(manual){ const box=document.getElementById("qBox"); if(box){ const rf=document.getElementById("qRefresh"); if(rf){ rf.disabled=true; rf.innerHTML=svg("refresh")+"갱신 중…"; } } }
     Promise.all([queueFetch(),maintenanceFetch()]).then(([all,maint])=>{ paint(all,maint); const el=document.getElementById("navQueueCnt"); if(el){ const a=all.filter(x=>x.status==="received"||x.status==="processing").length; if(a>0){el.textContent=a;el.hidden=false;}else{el.hidden=true;} } })
       .catch(e=>{ const box=document.getElementById("qBox"); if(box)box.innerHTML=emptyBox("base","큐를 불러오지 못했어요. 잠시 후 새로고침해주세요."); }); };
   load(false);
   QUEUE_TIMER=setInterval(()=>{ if(state.view==="__queue__"){ load(false); } else { clearInterval(QUEUE_TIMER); QUEUE_TIMER=null; } },20000);
 }

 /* ---------- 새 글 요청 (백엔드 큐 연동) ---------- */

 /* ========================================================================
    관리자 모드 — GitHub 토큰으로 잠금 해제 후 미발행 글을 사이트에서 직접 삭제.
    삭제 = GitHub Git Data API 로 글 폴더의 파일(blob)들을 제거하고 posts.json/
           manifest.json 을 갱신하는 단일 커밋을 만든다(서버·PC 불필요).
    보안: 진짜 잠금은 토큰. 토큰이 없으면 패널을 열어도 아무 것도 못 한다.
          발행된 글(published)은 삭제 버튼 자체가 안 붙는다.
    ===================================================================== */
 (function(){
   const OWNER="qtdqtd002-coder", REPO="bomding-blog-preview", BRANCH="main";
   const API="https://api.github.com/repos/"+OWNER+"/"+REPO;
   const LSK="bc_admin_token";
   let on=false, token="", who="";

   const authHdr=t=>({"Authorization":"Bearer "+t,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"});
   async function gh(path,opts){
     const url=path.indexOf("http")===0?path:API+path;
     const res=await fetch(url,Object.assign({headers:authHdr(token)},opts||{}));
     if(!res.ok){ let m=""; try{ m=(await res.json()).message; }catch(_){ } throw new Error("GitHub "+res.status+(m?": "+m:"")); }
     return res.status===204?null:res.json();
   }
   async function validate(t){
     const r=await fetch("https://api.github.com/user",{headers:authHdr(t)});
     if(!r.ok) throw new Error("토큰이 유효하지 않습니다 (HTTP "+r.status+").");
     const u=await r.json();
     const rr=await fetch(API,{headers:authHdr(t)});
     if(!rr.ok) throw new Error("이 토큰으로 리포에 접근할 수 없어요 (HTTP "+rr.status+"). 리포 권한을 확인하세요.");
     const repo=await rr.json();
     if(repo.permissions&&repo.permissions.push===false) throw new Error("이 토큰엔 쓰기(Contents: Read and write) 권한이 없어요.");
     return u.login;
   }
   async function getFile(p){
     const r=await gh("/contents/"+p.split("/").map(encodeURIComponent).join("/")+"?ref="+BRANCH);
     const bin=atob(String(r.content||"").replace(/\s/g,""));
     const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
     return new TextDecoder("utf-8").decode(bytes);
   }

   function relFolder(rel){ const i=rel.lastIndexOf("/"); return i<0?"":rel.slice(0,i); }
   function delScope(rel){
     const f=relFolder(rel);
     const same=POSTS.filter(x=>relFolder(x.rel)===f);
     return (f && same.length<=1) ? {folder:f,whole:true} : {folder:f,whole:false};
   }

   async function deletePost(rel,title){
     const p=POSTS.find(x=>x.rel===rel);
     if(!p) throw new Error("목록에 없는 글입니다.");
     if(p.published) throw new Error("발행된 글은 삭제할 수 없습니다.");
     const sc=delScope(rel);

     const ref=await gh("/git/ref/heads/"+BRANCH);
     const headSha=ref.object.sha;
     const commit=await gh("/git/commits/"+headSha);
     const baseTree=commit.tree.sha;
     const tree=await gh("/git/trees/"+baseTree+"?recursive=1");
     if(tree.truncated) throw new Error("리포 트리가 너무 커 안전 처리 불가(트리 잘림).");

     let delPaths;
     if(sc.whole){ delPaths=tree.tree.filter(t=>t.type==="blob"&&(t.path===rel||t.path.indexOf(sc.folder+"/")===0)).map(t=>t.path); }
     else { delPaths=[rel]; }
     if(!delPaths.length) throw new Error("삭제할 파일을 찾지 못했습니다.");

     // posts.json / manifest.json 갱신본 준비(삭제된 rel 제거)
     let postsArr=JSON.parse(await getFile("posts.json"));
     if(!Array.isArray(postsArr)) postsArr=[postsArr];
     postsArr=postsArr.filter(x=>delPaths.indexOf(x.rel)<0);
     let manObj=JSON.parse(await getFile("manifest.json"));
     delPaths.forEach(dp=>{ if(Object.prototype.hasOwnProperty.call(manObj,dp)) delete manObj[dp]; });

     const items=delPaths.map(pth=>({path:pth,mode:"100644",type:"blob",sha:null}));
     items.push({path:"posts.json",mode:"100644",type:"blob",content:JSON.stringify(postsArr,null,2)});
     items.push({path:"manifest.json",mode:"100644",type:"blob",content:JSON.stringify(manObj,null,2)});

     const newTree=await gh("/git/trees",{method:"POST",body:JSON.stringify({base_tree:baseTree,tree:items})});
     const newCommit=await gh("/git/commits",{method:"POST",body:JSON.stringify({
       message:"글 삭제(관리자): "+title+"\n\nrel: "+rel,tree:newTree.sha,parents:[headSha]})});
     await gh("/git/refs/heads/"+BRANCH,{method:"PATCH",body:JSON.stringify({sha:newCommit.sha})});

     POSTS=POSTS.filter(x=>delPaths.indexOf(x.rel)<0);
     return {count:delPaths.length};
   }

   /* 발행 완료(수동)는 이제 백엔드 MpubSvc(무토큰·가역)로 처리한다 → onTogglePublished 참고.
      (옛 깃 published.json 커밋 방식은 토큰이 필요해 제거했고, 자동검증 발행은 check-published.ps1 가 계속 담당) */

   /* ---- 토스트 ---- */
   let _toastEl=null,_toastT=0;
   function toast(msg,kind){
     if(!_toastEl){ _toastEl=document.createElement("div"); _toastEl.className="adm-toast"; _toastEl.setAttribute("role","status"); _toastEl.setAttribute("aria-live","polite"); _toastEl.setAttribute("aria-atomic","true"); document.body.appendChild(_toastEl); }
     _toastEl.textContent=msg; _toastEl.className="adm-toast show "+(kind||"");
     clearTimeout(_toastT); _toastT=setTimeout(()=>{ _toastEl.className="adm-toast"; }, kind==="err"?6500:3800);
   }

   /* ---- 카드 우상단 아이콘 메뉴(미발행만): 발행 완료 · 글 삭제 ---- */
   let _pop=null;
   function ensurePop(){
     if(_pop) return _pop;
     _pop=document.createElement("div"); _pop.className="admin-menu-pop"; _pop.hidden=true;
     /* 숨기기/해제·발행완료/취소: 토큰 불필요(누구나). 삭제만: 관리자(GitHub 토큰) 필요. */
     _pop.innerHTML='<button type="button" data-act="hide"></button>'+
                    '<button type="button" data-act="pub"></button>'+
                    '<div class="admin-menu-sep"></div>'+
                    '<button type="button" data-act="del">'+svg("trash")+'글 삭제</button>';
     _pop.querySelectorAll("[data-act]").forEach(it=>it.addEventListener("click",ev=>{
       ev.preventDefault(); ev.stopPropagation();
       const act=it.dataset.act, rel=_pop._rel, card=_pop._card; _pop.hidden=true;
       if(act==="hide") onToggleHide(rel,card);          /* 토큰 불필요 */
       else if(act==="pub") onTogglePublished(rel,card); /* 토큰 불필요 */
       else if(act==="del") requireUnlock(()=>onDelete(rel,card));
     }));
     document.body.appendChild(_pop);
     return _pop;
   }
   function closePop(){ if(_pop)_pop.hidden=true; }
   function openPopFor(btn,rel,card){
     const pop=ensurePop(); pop._rel=rel; pop._card=card; pop.hidden=false;
     const hb=pop.querySelector('[data-act="hide"]'); const isH=HIDDEN.has(rel);   /* 현재 숨김 상태로 라벨 결정 */
     if(hb)hb.innerHTML=svg(isH?"eye":"eyeOff")+(isH?"숨김 해제":"숨기기");
     const pbtn=pop.querySelector('[data-act="pub"]'); const isM=MPUB.has(rel);     /* 수동 발행완료 상태로 라벨 결정 */
     if(pbtn)pbtn.innerHTML=svg(isM?"eyeOff":"checkCircle")+(isM?"발행 완료 취소":"발행 완료");
     /* 삭제는 발행됨(자동·수동) 글엔 막혀 있으므로, 발행 상태면 삭제 버튼을 숨긴다(취소 후 삭제). */
     const dbtn=pop.querySelector('[data-act="del"]'); if(dbtn)dbtn.style.display=(card&&card.dataset.pub==="1")?"none":"";
     const r=btn.getBoundingClientRect(); const pw=pop.offsetWidth||150;
     let left=r.right-pw; if(left<8)left=8;
     let top=r.bottom+6; if(top+pop.offsetHeight>window.innerHeight-8)top=Math.max(8,r.top-pop.offsetHeight-6);
     pop.style.top=top+"px"; pop.style.left=left+"px";
   }
   /* 메뉴 아이콘은 항상 노출(미발행 글). 실제 삭제/발행완료를 누를 때만 토큰 인증을 요구한다. */
   function injectButtons(){
     contentEl.querySelectorAll(".card,.feat").forEach(card=>{
       if(card.dataset.autopub==="1") return;       /* 자동검증 발행글만 보호(메뉴 없음). 수동 발행완료는 메뉴 유지(취소 가능) */
       if(card.querySelector(".admin-menu")) return;
       const rel=card.dataset.rel; if(!rel) return;
       const wrap=document.createElement("div"); wrap.className="admin-menu";
       wrap.innerHTML='<button type="button" class="admin-menu-btn" title="관리 (숨기기·발행완료·삭제)" aria-label="글 관리 메뉴">'+svg("dots")+'</button>';
       const btn=wrap.querySelector(".admin-menu-btn");
       btn.addEventListener("click",ev=>{ ev.preventDefault(); ev.stopPropagation();
         if(_pop&&!_pop.hidden&&_pop._card===card){ closePop(); return; }
         openPopFor(btn,rel,card);
       });
       card.appendChild(wrap); card.classList.add("has-mgmt"); if(on)card.classList.add("admin-on");
     });
   }
   function syncOutlines(){ document.querySelectorAll(".card,.feat").forEach(c=>{ if(c.querySelector(".admin-menu"))c.classList.toggle("admin-on",on); }); }
   document.addEventListener("click",e=>{ if(_pop&&!_pop.hidden&&!e.target.closest(".admin-menu")&&!e.target.closest(".admin-menu-pop")) closePop(); });
   window.addEventListener("scroll",closePop,true);
   window.addEventListener("resize",closePop);

   async function onDelete(rel,card){
     const p=POSTS.find(x=>x.rel===rel); const title=(p&&p.title)||rel;
     const sc=delScope(rel);
     const scopeTxt=sc.whole?"글 폴더 전체(본문·이미지·붙여넣기본 포함)":"이 글 HTML 1개(폴더에 다른 글이 있어 폴더는 유지)";
     if(!confirm("정말 삭제할까요?\n\n「"+title+"」\n"+rel+"\n\n"+scopeTxt+"가 깃에서 제거되고 즉시 커밋됩니다.\n사이트/앱 반영까지 1~2분 · 깃 히스토리로 복구 가능.")) return;
     toast("삭제 중…");
     try{
       const r=await deletePost(rel,title);
       toast("삭제 완료 ("+r.count+"개 파일 제거) · 사이트 반영 1~2분","ok");
       render();
     }catch(e){ toast("삭제 실패: "+(e&&e.message||e),"err"); }
   }

   /* ---- 숨기기/숨김 해제 (토큰 불필요 — 누구나) ---- */
   async function onToggleHide(rel,card){
     const p=POSTS.find(x=>x.rel===rel); const title=(p&&p.title)||rel;
     const isH=HIDDEN.has(rel);
     if(!HiddenSvc.isConnected()){ toast("백엔드 미연결 — 숨김은 서버 연결이 필요해요.","err"); return; }
     if(!isH && !confirm("이 글을 숨길까요?\n\n「"+title+"」\n\n목록에서 모두에게 가려집니다(글은 삭제되지 않고 그대로 보존돼요).\n누구나 ‘숨긴 글 보기’에서 다시 해제할 수 있어요 · 즉시 반영.")) return;
     toast(isH?"숨김 해제 중…":"숨기는 중…");
     try{
       if(isH) await HiddenSvc.unhide(rel); else await HiddenSvc.hide(rel);
       toast(isH?"숨김을 해제했어요 · 모두에게 다시 보여요":"숨겼어요 · 모두에게 적용됐어요","ok");
       render();
     }catch(e){ toast((isH?"숨김 해제 실패: ":"숨김 실패: ")+(e&&e.message||e),"err"); }
   }

   /* ---- 발행 완료 / 발행 완료 취소 (토큰 불필요 — 누구나, 백엔드 저장) ---- */
   async function onTogglePublished(rel,card){
     const p=POSTS.find(x=>x.rel===rel); const title=(p&&p.title)||rel;
     const isM=MPUB.has(rel);
     if(!MpubSvc.isConnected()){ toast("백엔드 미연결 — 발행완료는 서버 연결이 필요해요.","err"); return; }
     if(!isM && !confirm("이 글을 ‘발행 완료’로 표시할까요?\n\n「"+title+"」\n\n‘발행됨’ 라벨이 붙고 딤드 처리돼요(‘발행글 보기’를 끄면 가려짐).\n누구나 다시 ‘발행 완료 취소’할 수 있어요 · 즉시 반영.")) return;
     toast(isM?"발행 완료 취소 중…":"발행 완료 처리 중…");
     try{
       if(isM) await MpubSvc.unmark(rel); else await MpubSvc.mark(rel);
       if(p) p.published=p.autopub||MPUB.has(rel);   /* 표시값 즉시 갱신(로드 후 토글 반영) */
       toast(isM?"발행 완료를 취소했어요 · 모두에게 반영":"발행 완료로 표시했어요 · 모두에게 반영","ok");
       render();
     }catch(e){ toast((isM?"발행 완료 취소 실패: ":"발행 완료 처리 실패: ")+(e&&e.message||e),"err"); }
   }

   /* ---- 관리자 상태 ---- */
   function requireUnlock(fn){ if(on){ fn(); } else { openModal(fn); } }   /* 잠금 풀려 있으면 즉시, 아니면 토큰 인증 후 이어서 실행 */
   function setOn(t,login){ on=true; token=t; who=login||""; try{ localStorage.setItem(LSK,t); }catch(_){ } updateBtn(); injectButtons(); syncOutlines(); chip(true); }
   function setOff(){ on=false; token=""; who=""; try{ localStorage.removeItem(LSK); }catch(_){ } closePop(); syncOutlines(); chip(false); updateBtn(); }
   function updateBtn(){ const b=document.getElementById("adminToggle"); if(!b) return; b.classList.toggle("on",on);
     b.innerHTML=svg(on?"lockOpen":"lock"); b.title=on?("관리자 모드 ON"+(who?" · "+who:"")):"관리자 모드"; }

   let _chip=null;
   function chip(show){
     if(show){ if(!_chip){ _chip=document.createElement("div"); _chip.className="adm-chip";
         _chip.innerHTML=svg("lockOpen")+"<span>관리자 모드</span>"; const x=document.createElement("button"); x.textContent="끄기";
         x.addEventListener("click",setOff); _chip.appendChild(x); document.body.appendChild(_chip); } }
     else if(_chip){ _chip.remove(); _chip=null; }
   }

   /* ---- 로그인/상태 모달 ---- (onSuccess: 잠금 해제 직후 이어서 실행할 동작) */
   function openModal(onSuccess){
     const mask=document.createElement("div"); mask.className="adm-mask";
     const close=()=>mask.remove();
     mask.addEventListener("click",e=>{ if(e.target===mask) close(); });
     let inner;
     if(on){
       inner=document.createElement("div"); inner.className="adm-box";
       inner.innerHTML=
         '<h3>'+svg("lockOpen")+'관리자 모드 켜짐</h3>'+
         '<p>로그인: <b>'+esc(who||"(확인됨)")+'</b><br>관리자 모드는 이제 <b>글 삭제</b>에만 필요해요. 숨기기·발행 완료는 토큰 없이 누구나 ⋮ 메뉴에서 할 수 있어요. 자동검증 발행글은 보호됩니다.</p>'+
         '<div class="adm-row"><button class="adm-btn danger" id="admLogout">로그아웃(토큰 지움)</button>'+
         '<button class="adm-btn ghost" id="admClose">닫기</button></div>';
       mask.appendChild(inner); document.body.appendChild(mask);
       inner.querySelector("#admClose").addEventListener("click",close);
       inner.querySelector("#admLogout").addEventListener("click",()=>{ setOff(); close(); toast("관리자 모드를 껐어요.",""); });
       return;
     }
     inner=document.createElement("div"); inner.className="adm-box";
     inner.innerHTML=
       '<h3>'+svg("lock")+'관리자 모드 켜기</h3>'+
       '<p>이 사이트의 깃허브 저장소에 쓰기 권한이 있는 <b>GitHub 토큰</b>으로 잠금을 풉니다. (계정 비밀번호가 아니라 토큰이에요.)</p>'+
       '<label>GitHub Personal Access Token</label>'+
       '<input id="admTok" type="password" placeholder="github_pat_… 또는 ghp_…" autocomplete="off" spellcheck="false">'+
       '<div class="adm-note">토큰 만들기 → <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">Fine-grained token 생성</a><br>· Repository access: <b>'+REPO+'</b>만 선택 · Permissions → <b>Contents: Read and write</b><br>· 입력한 토큰은 이 브라우저에만 저장되고 외부로 보내지 않습니다(깃허브 API 직접 호출).</div>'+
       '<div class="adm-msg" id="admMsg"></div>'+
       '<div class="adm-row"><button class="adm-btn primary" id="admGo">켜기</button>'+
       '<button class="adm-btn ghost" id="admCancel">취소</button></div>';
     mask.appendChild(inner); document.body.appendChild(mask);
     const tokEl=inner.querySelector("#admTok"), msg=inner.querySelector("#admMsg"), go=inner.querySelector("#admGo");
     inner.querySelector("#admCancel").addEventListener("click",close);
     tokEl.focus();
     async function submit(){
       const t=tokEl.value.trim(); if(!t){ msg.className="adm-msg err"; msg.textContent="토큰을 입력하세요."; return; }
       go.disabled=true; msg.className="adm-msg"; msg.textContent="확인 중…";
       try{ const login=await validate(t); setOn(t,login); close(); toast("관리자 모드 ON · "+login,"ok"); if(typeof onSuccess==="function")onSuccess(); }
       catch(e){ go.disabled=false; msg.className="adm-msg err"; msg.textContent=(e&&e.message)||String(e); }
     }
     go.addEventListener("click",submit);
     tokEl.addEventListener("keydown",e=>{ if(e.key==="Enter") submit(); });
   }

   /* ---- 초기화 ---- */
   const btn=document.getElementById("adminToggle");
   if(btn){ updateBtn(); btn.addEventListener("click",()=>openModal()); }
   let saved=""; try{ saved=localStorage.getItem(LSK)||""; }catch(_){ }
   if(saved){ validate(saved).then(login=>setOn(saved,login)).catch(()=>{ try{ localStorage.removeItem(LSK); }catch(_){ } }); }
   if(location.hash==="#admin") openModal();
   const obs=new MutationObserver(()=>{ injectButtons(); });   /* 메뉴는 항상 주입(인증은 동작 시점) */
   if(contentEl){ obs.observe(contentEl,{childList:true,subtree:true}); injectButtons(); }
 })();

})();
</script>
</body></html>
